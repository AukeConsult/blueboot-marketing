<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueboot — Jobs</title>
<link rel="stylesheet" href="vendor/bootstrap.min.css">
<link rel="stylesheet" href="vendor/tabler-icons.min.css">
<style>
:root {
  --bb-navy: #1a2035;
  --bb-accent: #4f6ef7;
  --bb-border: #e8eaee;
  --bb-muted: #6b7280;
  --bb-card-shadow: 0 1px 4px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
}
body { background: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.bb-nav { background: #fff; border-bottom: 1px solid var(--bb-border); padding: .6rem 1.5rem; display: flex; align-items: center; justify-content: center; gap: 0; }
.bb-nav .brand { color: #111; font-weight: 700; font-size: .95rem; text-decoration: none; display: flex; align-items: center; gap: .5rem; margin-right: 2rem; }
.bb-nav .brand i { color: var(--bb-accent); }
.bb-nav .nav-link { color: var(--bb-muted); font-size: .85rem; text-decoration: none; padding: .3rem .65rem; border-radius: 6px; transition: color .15s, background .15s; display: flex; align-items: center; gap: .35rem; }
.bb-nav .nav-link:hover { color: #111; background: #f4f5f7; }
.bb-nav .nav-link.active { color: var(--bb-accent); background: #eef0ff; }
.bb-nav .nav-links { display: flex; gap: .25rem; }
.bb-card { background: #fff; border-radius: 10px; box-shadow: var(--bb-card-shadow); border: 1px solid var(--bb-border); }
.job-card { cursor: pointer; transition: border-color .15s; }
.job-card:hover { border-color: #adb5bd !important; }
.detail { display: none; }
.spinner-xs { width: 14px; height: 14px; border-width: 2px; }
pre { background: #f8f9fa; border-radius: 6px; padding: .5rem .75rem; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; border: 1px solid var(--bb-border); }
.jp { display: inline-flex; align-items: center; font-size: .72rem; font-weight: 600; padding: .2rem .55rem; border-radius: 20px; }
.jp-queued  { background: #dbeafe; color: #1d4ed8; }
.jp-running { background: #fef9c3; color: #854d0e; }
.jp-done    { background: #dcfce7; color: #15803d; }
.jp-error   { background: #fee2e2; color: #b91c1c; }
</style>
</head>
<body>

<nav class="bb-nav">
  <a href="index.html" class="brand"><i class="ti ti-bolt"></i>Blueboot CRM</a>
  <div class="nav-links">
    <a href="campaigns.html" class="nav-link"><i class="ti ti-speakerphone"></i>Campaigns</a>
    <a href="crm-bp.html" class="nav-link"><i class="ti ti-server-2"></i>CRM</a>
    <a href="jobs.html" class="nav-link active"><i class="ti ti-list-check"></i>Jobs</a>
    <a href="filter-facets.html" class="nav-link"><i class="ti ti-filter"></i>Filter Facets</a>
  </div>
</nav>

<div class="container py-4" style="max-width:900px">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h5 class="mb-0 fw-600" style="font-size:1rem"><i class="ti ti-list-check me-2 text-primary"></i>Jobs</h5>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadJobs()">
      <i class="ti ti-refresh me-1"></i>Refresh
    </button>
  </div>

  <div id="jobs-list">
    <div class="text-center py-4" style="color:var(--bb-muted)">
      <div class="spinner-border spinner-border-sm me-2"></div>Loading jobs…
    </div>
  </div>

</div>

<script>
const BASE = 'https://us-central1-blueboot-market.cloudfunctions.net/crmApi';

function fmt(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function elapsed(a,b){
  if(!a||!b) return '';
  const s = Math.round((new Date(b)-new Date(a))/1000);
  return s < 60 ? s+'s' : Math.floor(s/60)+'m '+s%60+'s';
}

function jobPill(status){
  return `<span class="jp jp-${status||'queued'}">${status}</span>`;
}

const JOB_NAMES = {'contact-sync':'Import contacts','push-and-sync':'Push selected to CRM','template-sync':'Sync CRM to Leads Database','campaign-sync':'Campaign sync'};

function renderJobs(jobs){
  const el = document.getElementById('jobs-list');
  if(!jobs.length){
    el.innerHTML='<div class="text-center py-4 small" style="color:var(--bb-muted)"><i class="ti ti-inbox me-1"></i>No jobs yet</div>';
    return;
  }
  el.innerHTML = jobs.map(j=>{
    const spin = (j.status==='running'||j.status==='queued')
      ? '<div class="spinner-border spinner-xs text-warning me-2" role="status"></div>' : '';
    const result = j.result ? JSON.stringify(j.result,null,2) : '';
    const err = j.error || '';
    const duration = elapsed(j.started_at, j.finished_at);
    const params = j.params && Object.keys(j.params).length ? JSON.stringify(j.params) : '';
    return `<div class="bb-card mb-2 job-card" onclick="toggle('${j.id}')">
      <div class="px-3 py-2">
        <div class="d-flex align-items-center gap-2">
          ${spin}
          ${jobPill(j.status)}
          <span class="fw-500 flex-grow-1 small">${JOB_NAMES[j.name]||j.name}</span>
          <small style="color:var(--bb-muted)">${fmt(j.queued_at)}${duration?' · '+duration:''}</small>
          <i class="ti ti-chevron-down" style="color:var(--bb-muted);font-size:.8rem"></i>
        </div>
        <div class="detail mt-2 pt-2 border-top" id="d-${j.id}">
          <div class="small mb-1" style="color:var(--bb-muted)">id: <code>${j.id}</code>${params?' &nbsp; params: <code>'+params+'</code>':''}</div>
          ${result?'<pre>'+result+'</pre>':''}
          ${err?'<pre class="text-danger">'+err+'</pre>':''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(id){
  const el = document.getElementById('d-'+id);
  el.style.display = el.style.display==='block' ? 'none' : 'block';
}

async function loadJobs(){
  try{
    const r = await fetch(BASE+'/api/crm/jobs?limit=50');
    const d = await r.json();
    renderJobs(d.jobs||[]);
  } catch(e){
    document.getElementById('jobs-list').innerHTML=`<div class="text-center text-danger py-4 small">Could not reach API: ${e.message}</div>`;
  }
}

loadJobs();
setInterval(loadJobs, 5000);
</script>
</body>
</html>
