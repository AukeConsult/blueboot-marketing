<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueboot — CRM Follow-up</title>
<link rel="stylesheet" href="vendor/bootstrap.min.css">
<link rel="stylesheet" href="vendor/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
<style>

.follow-input {
  border: 1px solid transparent; background: transparent;
  font-size: .8rem; width: 100%; min-width: 0; padding: 2px 4px; border-radius: 4px;
  transition: border-color .15s, background .15s; overflow: hidden; text-overflow: ellipsis;
}
.follow-input:hover { border-color: var(--bb-border); background: #fff; }
.follow-input:focus { border-color: var(--bb-accent); background: #fff; outline: none;
  box-shadow: 0 0 0 2px rgba(79,110,247,.15); }
.follow-input::placeholder { color: var(--bb-muted); font-size: .78rem; }
.contact-title { font-size: .73rem; color: var(--bb-muted); }
/* Side-panel comment textarea */
.sp-comment-input {
  resize: vertical; overflow-y: auto; line-height: 1.4;
  min-height: 1.4em; white-space: pre-wrap; word-break: break-word;
}

.follow-select {
  border: 1px solid transparent; background: transparent;
  font-size: .8rem; padding: 2px 4px; border-radius: 4px; cursor: pointer; width: 100%;
  transition: border-color .15s, background .15s;
}
.follow-select:hover { border-color: var(--bb-border); background: #fff; }
.follow-select:focus { border-color: var(--bb-accent); background: #fff; outline: none; }

.save-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--bb-accent); margin-left: 4px; vertical-align: middle;
  animation: dot-blink .6s ease-in-out infinite;
}
.save-dot.err { background: #dc2626; animation: none; }
.save-dot.ok  { background: #16a34a; animation: none; }
@keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* Comment row styling — in css/styles.css (.comment-row-inner, .comment-row-input) */
.hist-toggle { flex-shrink: 0; background: none; border: none; cursor: pointer;
  color: var(--bb-muted); padding: 0 3px; border-radius: 4px; line-height: 1;
  display: flex; align-items: center; gap: 2px; font-size: .72rem; }
.hist-toggle:hover { color: var(--bb-accent); background: #eef0ff; }
/* .hist-count sizing and comment input font — defined in css/styles.css */

/* History row */
/* ── Contact card grouping ───────────────────────────────────────────────── */
/* Each contact = data row + comment row (+ optional history row).           */
/* Together they form one visual card with a shared border and background.   */

/* Data row — top of card */
.follow-data-row > td {
  background: #fff;
  border-top: 1px solid #e5e7eb !important;
  border-bottom: none !important;
}
.follow-data-row > td:first-child  { border-left:  2px solid #e5e7eb; }
.follow-data-row > td:last-child   { border-right: 2px solid #e5e7eb; }

/* Comment row — bottom of card, same background as data row */
.follow-comment-row > td {
  background: #fff;
  border-top: none !important;
  border-bottom: 2px solid #e5e7eb !important;
}
.follow-comment-row > td:first-child { border-left:  2px solid #e5e7eb; }
.follow-comment-row > td:last-child  { border-right: 2px solid #e5e7eb; }

/* History row — extends card when open */
.follow-history-row > td {
  background: #f5f6ff;
  border-top: 1px dashed #c7ceff !important;
  border-bottom: 2px solid #e5e7eb !important;
  border-left:  2px solid #e5e7eb;
  border-right: 2px solid #e5e7eb;
}

/* Overdue / due-soon accent on left edge of data row only */
tr.row-overdue  > td:first-child  { border-left: 3px solid #fca5a5 !important; }
tr.row-due-soon > td:first-child  { border-left: 3px solid #fde68a !important; }

/* Hover lifts the whole card */
.follow-data-row:hover > td,
.follow-data-row:hover + .follow-comment-row > td {
  background: #f5f6ff;
}

/* Active (side-panel) card */
tr.row-sp-active > td,
tr.row-sp-active + .follow-comment-row > td { background: #eef0ff !important; }

.follow-history-row td { border-top: none; }
.hist-row-td { padding: 0 8px 8px; }
.hist-list { display: flex; flex-direction: column; gap: 3px; padding: 4px 0 0; }
.hist-entry { font-size: .76rem; border-radius: 5px; border: 1px solid var(--bb-border);
  background: #f8f9fa; overflow: hidden; user-select: none; }
.hist-entry-summary { display: flex; align-items: center; gap: 6px;
  padding: 3px 6px; min-height: 24px; }
.hist-entry-date { color: var(--bb-muted); white-space: nowrap; flex-shrink: 0; }
.hist-entry-preview { color: #374151; flex: 1; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; }
.hist-entry-chevron { color: var(--bb-muted); font-size: .7rem; flex-shrink: 0;
  margin-left: auto; transition: transform .15s; }
.hist-entry-detail { display: none; padding: 4px 8px 6px; border-top: 1px solid var(--bb-border);
  font-size: .75rem; color: #374151; background: #fff; }
.hist-entry.hist-entry-open .hist-entry-detail { display: block; }
.hist-detail-lbl { color: var(--bb-muted); font-weight: 600; margin-right: 4px; }
.hist-entry-text { color: #111; white-space: pre-wrap; word-break: break-word; }

/* Importance select */
.imp-select { border: 1px solid transparent; background: transparent;
  font-size: .8rem; padding: 2px 4px; border-radius: 4px; cursor: pointer;
  font-weight: 600; transition: border-color .15s, background .15s; }
.imp-select:focus { outline: none; }
.imp-none   { color: var(--bb-muted); }
.imp-low    { color: #4b5563; background: #f3f4f6; border-color: #d1d5db; }
.imp-medium { color: #92400e; background: #fef3c7; border-color: #fde68a; }
.imp-high   { color: #991b1b; background: #fee2e2; border-color: #fca5a5; }

/* Email sync button on each row */
.sync-btn { background: none; border: none; cursor: pointer; padding: 1px 3px;
  border-radius: 4px; color: var(--bb-muted); font-size: .78rem; line-height: 1; }
.sync-btn:hover { color: var(--bb-accent); background: #eef0ff; }
.sync-btn.spinning i { display: inline-block; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.newmail-btn { background: none; border: none; cursor: pointer; color: #d97706;
  padding: 1px 3px; border-radius: 4px; font-size: .9rem; line-height: 1; flex-shrink: 0; }
.newmail-btn:hover { opacity: .7; }

/* Email history entries */
.hist-entry-email-in  { background: #f0fdf4; border-color: #bbf7d0; }
.hist-entry-email-out { background: #eff6ff; border-color: #bfdbfe; }
.hist-type-badge { font-size: .65rem; font-weight: 700; padding: 1px 5px;
  border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
.hist-type-in  { background: #dcfce7; color: #15803d; }
.hist-type-out { background: #dbeafe; color: #1d4ed8; }
/* hist-expand-btn removed — accordion per entry */

/* Overdue / due-soon date highlighting */
.date-overdue  { color: #b91c1c !important; font-weight: 600; }
.date-due-soon { color: #92400e !important; font-weight: 600; }
/* overdue/due-soon borders moved to contact-card section above */



/* Secondary (nested) group header */
.group-subheader-row td {
  background: #f8f9ff;
  font-weight: 600;
  font-size: .74rem;
  color: #6b7280;
  padding: 4px 10px 4px 28px;
  border-top: 1px solid #e5e7eb;
  cursor: pointer;
  user-select: none;
}
.group-subheader-row td:hover { background: #eff1ff; }
.group-subheader-row .group-count { font-weight: 400; }

/* Collapsible group headers */
.group-header-row td { cursor: pointer; user-select: none; }
.group-header-row td:hover { background: #e4e8ff; }
.group-chevron { float: right; transition: transform .2s; }
.group-chevron.collapsed { transform: rotate(-90deg); }

/* Group view header rows */
.group-header-row td {
  background: #eef0ff;
  font-weight: 600;
  font-size: .78rem;
  color: var(--bb-accent);
  padding: 5px 10px;
  border-top: 2px solid #c7ceff;
  border-bottom: 1px solid #c7ceff;
}
.group-chk {
  vertical-align: middle;
  margin-right: 6px;
  margin-top: -1px;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  z-index: 1;
}

/* Side-panel layout */
#follow-layout { display: flex; align-items: flex-start; gap: 0; }
#follow-layout .bb-card { flex: 1; min-width: 0; }
.follow-side-panel {
  width: 0; overflow: hidden;
  transition: width .2s ease, opacity .2s ease;
  opacity: 0;
  flex-shrink: 0;
}
.follow-side-panel.sp-open {
  width: 25vw;
  opacity: 1;
  margin-left: 12px;
}
.follow-side-panel .bb-card { width: 25vw; min-width: 25vw; }
tr.row-sp-active > td { background: #f0f2ff !important; }
.sp-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: #e6f1fb; display: flex; align-items: center;
  justify-content: center; font-size: 14px; font-weight: 500;
  color: #185fa5; flex-shrink: 0;
}
.sp-section { padding: 10px 14px; border-bottom: 1px solid var(--bb-border); }
.sp-section-label {
  font-size: .68rem; color: var(--bb-muted); text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 8px; font-weight: 600;
}
.sp-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; font-size: .8rem; }
.sp-row i { font-size: 14px; color: var(--bb-muted); flex-shrink: 0; margin-top: 1px; }
.sp-muted { color: var(--bb-muted); }
.bb-field-grid { display:grid; grid-template-columns:auto 1fr; gap:3px 12px; align-items:baseline; }
.bb-field-label { font-size:11px; color:var(--bb-muted); white-space:nowrap; padding:2px 0; }
.bb-field-value { font-size:12px; color:#111; padding:2px 0; border-bottom:.5px solid #f0f0f0; }
.sp-company-grid .bb-field-value { font-size:11px; }
.sp-btn-panel { display: flex; gap: .5rem; padding: 10px 14px; }
.sp-ch-btn { color: var(--bb-accent) !important; background: #eef0ff; border-color: #c7ceff; }
.group-header-row td .group-count {
  font-weight: 400;
  color: var(--bb-muted);
  margin-left: 6px;
}


/* Compact group-by selects in card header */
.group-select {
  border: 1px solid transparent; background: transparent;
  font-size: .76rem; padding: 2px 4px; border-radius: 4px;
  cursor: pointer; color: var(--bb-muted); max-width: 130px;
  transition: border-color .15s, background .15s, color .15s;
}
.group-select:hover { border-color: var(--bb-border); background: #fff; color: #374151; }
.group-select:focus { border-color: var(--bb-accent); background: #fff; color: #374151; outline: none; }

/* Header filter pill groups */
.hdr-group {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 8px;
}
.hdr-group-label {
  font-size: .66rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: var(--bb-muted); white-space: nowrap; margin-right: 2px;
}
.hdr-group-filter {
  background: #eef0ff; border: 1px solid #c7ceff;
}
.hdr-group-actions {
  background: #f3f4f6; border: 1px solid #e5e7eb;
}

/* Primary header selectors — owner and campaign — more prominent */
.bb-header-select {
  border: 1px solid var(--bb-border); background: #fff;
  font-size: .82rem; font-weight: 600; padding: 4px 8px; border-radius: 6px;
  color: #374151; cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.bb-header-select:hover { border-color: var(--bb-accent); box-shadow: 0 0 0 3px rgba(79,110,247,.1); }
.bb-header-select:focus { border-color: var(--bb-accent); outline: none; box-shadow: 0 0 0 3px rgba(79,110,247,.15); }

/* Discreet action buttons (collapse-all, sync, refresh) */
.collapse-all-btn, .header-action-btn {
  border: 1px solid transparent; background: transparent;
  color: var(--bb-muted); border-radius: 4px; padding: 2px 7px;
  cursor: pointer; font-size: .78rem; line-height: 1.6; white-space: nowrap;
  transition: border-color .15s, background .15s, color .15s;
}
.collapse-all-btn:hover, .header-action-btn:hover {
  border-color: var(--bb-border); background: #fff; color: var(--bb-accent);
}
.header-action-btn.spinning i { display: inline-block; animation: spin .7s linear infinite; }

/* View toggle buttons */
.view-toggle { display: flex; gap: 2px; }
.view-toggle .btn { padding: 2px 8px; }

/* Action bar */
.action-bar { background: #eef0ff; border: 1px solid #c7ceff; border-radius: 8px;
  font-size: .82rem; overflow: hidden; }
.action-bar-top { display: flex; align-items: center; gap: .6rem;
  padding: .45rem .85rem; flex-wrap: wrap; }
.action-bar-top .batch-count { font-weight: 600; color: var(--bb-accent); }
.action-bar-divider { width: 1px; height: 1rem; background: #c7ceff; margin: 0 .2rem; flex-shrink: 0; }
.action-bar-panel { border-top: 1px solid #c7ceff; padding: .6rem .85rem;
  background: #f5f6ff; display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }

</style>
</head>
<body>

<div id="nav"></div>

<div class="container-fluid py-4 px-4" style="max-width:1600px">

  <div class="page-header mb-3">
    <h5 class="page-title"><i class="ti ti-phone-check text-primary"></i>CRM Follow-up</h5>
    <div class="d-flex align-items-center gap-2 flex-wrap">

      <!-- Filter group: owner / campaign / outreach -->
      <div class="hdr-group hdr-group-filter">
        <span class="hdr-group-label"><i class="ti ti-filter me-1"></i>Filter</span>
        <select id="owner-header" class="group-select bb-header-select" title="Filter by owner" onchange="onOwnerChange()" style="max-width:150px">
          <option value="">All owners</option>
        </select>
        <select id="campaign-filter" class="group-select bb-header-select" title="Filter by campaign" onchange="load()" style="max-width:180px">
          <option value="">All campaigns</option>
        </select>
      </div>

      <!-- Actions group: sync period / sync / refresh / help -->
      <div class="hdr-group hdr-group-actions">
        <span class="hdr-group-label"><i class="ti ti-mail me-1"></i>Mail</span>
        <select id="sync-period" class="group-select" title="Email sync lookback period">
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30">Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="0">All time</option>
        </select>
        <button class="header-action-btn" id="sync-all-btn" onclick="syncAllEmails()" title="Sync all emails">
          <i class="ti ti-mail-bolt me-1"></i>Sync
        </button>
        <button class="header-action-btn" onclick="load()" title="Refresh contacts">
          <i class="ti ti-refresh"></i>
        </button>
        <a href="doc-viewer.html?doc=followup-page-usage" target="_blank" class="header-action-btn" title="Follow-up page help">
          <i class="ti ti-help"></i>
        </a>
      </div><!-- /.hdr-group-actions -->

    </div><!-- /.d-flex header row -->
  </div><!-- /.page-header -->

  <!-- Filters -->
  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <input id="search" class="form-control form-control-sm" style="max-width:240px"
      placeholder="Search name, email, website or title…" oninput="applyFilter()">


    <select id="followup-filter" class="form-select form-select-sm" style="max-width:170px" onchange="applyFilter()">
      <option value="">All follow-up statuses</option>
      <option value="__none__">No status set</option>
      <option value="open">Open</option>
      <option value="contacted">Contacted</option>
      <option value="send_mail">Send mail</option>
      <option value="replied">Replied</option>
      <option value="meeting">Meeting booked</option>
      <option value="offer_sent">Offer sent</option>
      <option value="accepted">Accepted offer</option>
      <option value="closed">Closed</option>
      <option value="not_interested">Not interested</option>
    </select>

    <select id="importance-filter" class="form-select form-select-sm" style="max-width:145px" onchange="applyFilter()">
      <option value="">All importances</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
      <option value="__none__">Not set</option>
    </select>

    <select id="contact-status-filter" class="form-select form-select-sm" style="max-width:155px" onchange="applyFilter()">
      <option value="open">Open contacts</option>
      <option value="">All contacts</option>
      <option value="pending">Pending only</option>
      <option value="sent">Sent only</option>
      <option value="excluded">Excluded only</option>
    </select>

    <select id="due-filter" class="form-select form-select-sm" style="max-width:150px" onchange="applyFilter()">
      <option value="">Any date</option>
      <option value="none">No date set</option>
      <option value="overdue">Past due</option>
      <option value="today">Due today</option>
      <option value="week">Due this week</option>
    </select>

    <span id="count-badge" class="small ms-auto" style="color:var(--bb-muted)"></span>
  </div>

  <!-- Action bar (visible when rows are selected) -->
  <div id="action-bar" class="action-bar mb-3" style="display:none">
    <!-- Top row: count + action buttons -->
    <div class="action-bar-top">
      <span class="batch-count" id="batch-count">0</span>
      <span style="color:var(--bb-muted)">selected</span>
      <div class="action-bar-divider"></div>
      <button class="btn btn-sm btn-outline-secondary py-0" onclick="clearSelection()">
        <i class="ti ti-x me-1"></i>Clear
      </button>
      <div class="action-bar-divider"></div>
      <button class="btn btn-sm btn-outline-primary py-0" id="ab-date-btn" onclick="showBatchDatePanel()">
        <i class="ti ti-calendar me-1"></i>Set follow-up date
      </button>
      <div class="action-bar-divider"></div>
      <button class="btn btn-sm btn-outline-secondary py-0" id="ab-move-btn" onclick="showMovePanel()">
        <i class="ti ti-folders me-1"></i>Move to campaign
      </button>
      <div class="action-bar-divider"></div>
      <button class="btn btn-sm btn-outline-secondary py-0" id="ab-owner-btn" onclick="showAssignOwnerPanel()">
        <i class="ti ti-user-check me-1"></i>Assign owner
      </button>
    </div>

    <!-- Inline date panel -->
    <div id="batch-date-panel" class="action-bar-panel" style="display:none">
      <label class="small fw-500 mb-0" style="color:var(--bb-muted)">Date</label>
      <input type="date" id="batch-date-input" class="form-control form-control-sm" style="max-width:160px">
      <label class="small fw-500 mb-0" style="color:var(--bb-muted)">Status</label>
      <select id="batch-date-status-select" class="form-select form-select-sm" style="max-width:180px">
        <option value="">— keep current —</option>
      </select>
      <label class="small fw-500 mb-0" style="color:var(--bb-muted)">Comment</label>
      <input type="text" id="batch-date-comment" class="form-control form-control-sm" style="max-width:280px" placeholder="Optional note…">
      <button class="btn btn-sm btn-primary" onclick="applyBatchDate()">
        <i class="ti ti-check me-1"></i>Apply to <span id="batch-apply-count">0</span> selected
      </button>
      <button class="btn btn-sm btn-outline-secondary" onclick="hideBatchDatePanel()">Cancel</button>
      <span id="batch-date-status" class="small ms-1" style="color:var(--bb-muted)"></span>
    </div>

    <!-- Inline move panel -->
    <div id="move-panel" class="action-bar-panel" style="display:none">
      <span class="small fw-500" style="color:var(--bb-muted)">Move <span id="move-count">0</span> selected to:</span>
      <div class="d-flex align-items-center gap-2">
        <div class="form-check form-check-inline mb-0">
          <input class="form-check-input" type="radio" name="move-target" id="move-opt-existing" value="existing" checked onchange="onMoveOptionChange()">
          <label class="form-check-label small" for="move-opt-existing">Existing</label>
        </div>
        <div class="form-check form-check-inline mb-0">
          <input class="form-check-input" type="radio" name="move-target" id="move-opt-new" value="new" onchange="onMoveOptionChange()">
          <label class="form-check-label small" for="move-opt-new">New</label>
        </div>
      </div>
      <div id="move-existing-wrap">
        <select id="move-campaign-select" class="form-select form-select-sm" style="max-width:240px"></select>
      </div>
      <div id="move-new-wrap" style="display:none">
        <input type="text" id="move-new-name" class="form-control form-control-sm" style="max-width:240px" placeholder="New campaign name…">
      </div>
      <button class="btn btn-sm btn-primary" id="move-apply-btn" onclick="applyMove()">
        <i class="ti ti-check me-1"></i>Move
      </button>
      <button class="btn btn-sm btn-outline-secondary" onclick="hideMovePanel()">Cancel</button>
      <span id="move-status" class="small ms-1" style="color:var(--bb-muted)"></span>
    </div>

    <!-- Inline assign-owner panel -->
    <div id="assign-owner-panel" class="action-bar-panel" style="display:none">
      <span class="small fw-500" style="color:var(--bb-muted)">Assign <span id="assign-owner-count">0</span> selected to owner:</span>
      <select id="assign-owner-select" class="form-select form-select-sm" style="max-width:260px">
        <option value="">— clear owner —</option>
      </select>
      <button class="btn btn-sm btn-primary" id="assign-owner-apply-btn" onclick="applyAssignOwner()">
        <i class="ti ti-check me-1"></i>Apply
      </button>
      <button class="btn btn-sm btn-outline-secondary" onclick="hideAssignOwnerPanel()">Cancel</button>
      <span id="assign-owner-status" class="small ms-1" style="color:var(--bb-muted)"></span>
    </div>
  </div>

  <!-- Job status feedback -->
  <div id="sync-feedback" class="alert py-2 px-3 small mb-3" style="display:none"></div>

  <!-- Table + side panel -->
  <div id="follow-layout">
  <div class="bb-card">
    <div class="px-3 py-2 d-flex align-items-center justify-content-between border-bottom bb-card-header">
      <span class="fw-500 small"><i class="ti ti-list-check me-1 text-primary"></i>Contacts</span>
      <div class="d-flex align-items-center gap-2">
        <div id="group-selectors" class="d-flex align-items-center gap-1" style="display:none">
          <select id="group-primary" class="group-select" title="Group by" onchange="applyFilter()">
            <option value="followup_status">Status</option>
            <option value="followup_importance">Importance</option>
            <option value="followup_date">Date</option>
            <option value="owner">Owner</option>
            <option value="followup_owner">F/U owner</option>
          </select>
          <i class="ti ti-chevron-right" style="color:var(--bb-muted);font-size:.7rem"></i>
          <select id="group-secondary" class="group-select" title="Then by" onchange="applyFilter()">
            <option value="">then by…</option>
            <option value="followup_status">Status</option>
            <option value="followup_importance">Importance</option>
            <option value="followup_date">Date</option>
            <option value="owner">Owner</option>
            <option value="followup_owner">F/U owner</option>
          </select>
          <button id="collapse-all-btn" class="collapse-all-btn" onclick="toggleAllGroups()" title="Collapse all groups">
            <i class="ti ti-arrows-minimize"></i>
          </button>
        </div>
        <div class="view-toggle">
          <button id="view-group-btn" class="btn btn-sm btn-outline-secondary" onclick="toggleView('group')" title="Grouped view">
            <i class="ti ti-layout-rows"></i>
          </button>
          <button id="view-list-btn" class="btn btn-sm btn-primary" onclick="toggleView('list')" title="List view">
            <i class="ti ti-list"></i>
          </button>
          <button id="side-panel-btn" class="btn btn-sm btn-outline-secondary" onclick="toggleSidePanel()" title="Toggle contact detail panel">
            <i class="ti ti-layout-sidebar-right"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-sm table-hover mb-0" style="table-layout:fixed;width:100%">
        <thead class="bb-thead"><tr>
          <th style="width:32px"><input type="checkbox" class="form-check-input" id="select-all" onclick="toggleSelectAll(this)"></th>
          <th class="small bb-sortable d-none d-lg-table-cell" data-col="status"           onclick="sortBy('status')" style="width:95px">Status <span class="sort-icon"></span></th>
          <th class="small bb-sortable d-none d-xl-table-cell" data-col="name"             onclick="sortBy('name')" style="width:180px;min-width:140px">Name <span class="sort-icon"></span></th>
          <th class="small bb-sortable"                         data-col="email"            onclick="sortBy('email')" style="width:200px">Email <span class="sort-icon"></span></th>
          <th class="small d-none d-xxl-table-cell" style="width:130px">Phone</th>
          <th class="small bb-sortable d-none d-xxl-table-cell" data-col="website"          onclick="sortBy('website')" style="width:155px">Website <span class="sort-icon"></span></th>
          <th class="small bb-sortable d-none d-lg-table-cell" data-col="followup_date"    onclick="sortBy('followup_date')" style="width:135px">Follow-up date <span class="sort-icon"></span></th>
          <th class="small bb-sortable"                         data-col="followup_status"  onclick="sortBy('followup_status')" style="width:155px">Follow-up status <span class="sort-icon"></span></th>
          <th class="small bb-sortable d-none d-xl-table-cell" data-col="followup_importance" onclick="sortBy('followup_importance')" style="width:105px">Importance <span class="sort-icon"></span></th>
          <th class="small bb-sortable d-none d-xl-table-cell" data-col="followup_owner" onclick="sortBy('followup_owner')" style="width:130px">F/U owner <span class="sort-icon"></span></th>
        </tr></thead>
        <tbody id="follow-tbody">
          <tr><td colspan="10" class="text-center py-5" style="color:var(--bb-muted)">
            <div class="spinner-border spinner-border-sm me-2"></div>Loading…
          </td></tr>
        </tbody>
      </table>
    </div>
    <div id="follow-empty" class="text-center py-3 small" style="color:var(--bb-muted);display:none">
      No contacts match the current filters.
    </div>
  </div><!-- /.bb-card -->

  <!-- Contact side panel -->
  <div id="contact-side-panel" class="follow-side-panel">
    <div class="bb-card">
      <div class="px-3 py-2 d-flex align-items-center justify-content-between border-bottom bb-card-header">
        <span class="fw-500 small"><i class="ti ti-user me-1 text-primary"></i>Contact</span>
        <button class="collapse-all-btn" onclick="closeSidePanel()" title="Close panel"><i class="ti ti-x"></i></button>
      </div>
      <div id="sp-body" style="overflow-y:auto;max-height:calc(100vh - 160px)">
        <div class="sp-section text-center py-4 small" style="color:var(--bb-muted)">
          Click a row to view contact details.
        </div>
      </div>
    </div>
  </div>
  </div><!-- /#follow-layout -->

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/crm-common.js"></script>
<script>
'use strict';

let allRows  = [];
let _sortCol = '';
let _sortAsc = true;
let _currentView = 'list';
const _collapsedGroups = new Set();
let _currentGroupKeys = [];
let _allCampaigns = [];   // loaded from /followup-meta
let _allUsers     = [];   // loaded from /followup-meta (for followup_owner dropdown)
const selected = new Set();   // doc_path strings
let _groupDocPaths = {};              // groupKey -> [doc_path, ...] built by renderGrouped
const _CHANNEL_HREF = {
  linkedin:   v => v.startsWith('http') ? v : 'https://linkedin.com/in/' + v,
  twitter:    v => v.startsWith('http') ? v : 'https://x.com/' + v.replace(/^@/,''),
  facebook:   v => v.startsWith('http') ? v : 'https://facebook.com/' + v,
  instagram:  v => v.startsWith('http') ? v : 'https://instagram.com/' + v.replace(/^@/,''),
  whatsapp:   v => 'https://wa.me/' + v.replace(/[^0-9]/g,''),
  teams:      v => v.includes('@') ? 'https://teams.microsoft.com/l/chat/0/0?users=' + encodeURIComponent(v) : (v.startsWith('http') ? v : '#'),
  telegram:   v => v.startsWith('http') ? v : 'https://t.me/' + v.replace(/^@/,''),
  googlechat: v => v.startsWith('http') ? v : 'https://mail.google.com/chat/u/0/#dm/' + encodeURIComponent(v),
  messenger:  v => v.startsWith('http') ? v : 'https://m.me/' + v,
};
let _sideOpen      = false;           // side panel visible
let _sidePanelGidx = -1;
let _spChannelsOpen = false;          // channels section collapsed by default             // which contact is shown in side panel
let _spCompanyOpen  = true;           // company info section open by default
let _prefsReady       = false;  // true only after first load() completes with prefs applied
let _loadedPrefs      = null;   // prefs fetched by loadUserPrefs(); applied inside load()

// ── Load contacts via API (no direct Firestore reads) ─────────────────────────

async function loadMeta() {
  if (_allCampaigns.length) return;   // already loaded
  try {
    const meta = await fetchJSON(BASE + '/api/crm/followup-meta');
    _allCampaigns = meta.campaigns || [];
    _allUsers     = meta.users     || [];
    const owners = meta.owners || [];
    populateSelect('owner-header', owners, 'All owners');
    // Inject "No owner" option right after "All owners"
    const _ownerSel = document.getElementById('owner-header');
    if (_ownerSel) {
      const _noneOpt = document.createElement('option');
      _noneOpt.value = '__none__'; _noneOpt.textContent = 'No owner';
      _ownerSel.insertBefore(_noneOpt, _ownerSel.options[1]);
    }
  } catch(e) { console.warn('[meta]', e); }
}

function populateCampaignDropdown(ownerVal) {
  const filtered = ownerVal === '__none__'
    ? _allCampaigns.filter(c => !c.owner)
    : ownerVal
      ? _allCampaigns.filter(c => c.owner === ownerVal)
      : _allCampaigns;
  const sel = document.getElementById('campaign-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All campaigns</option>'
    + filtered.map(c => `<option value="${escapeHtml(c.id)}"${c.id === cur ? ' selected' : ''}>${escapeHtml(c.id)}</option>`).join('');
}

async function onOwnerChange() {
  const own = document.getElementById('owner-header').value;
  populateCampaignDropdown(own);
  // Reset campaign if the current selection doesn't belong to the new owner
  const sel = document.getElementById('campaign-filter');
  if (sel.value && own) {
    const camp = _allCampaigns.find(c => c.id === sel.value);
    if (camp) {
      const mismatch = own === '__none__' ? !!camp.owner : camp.owner !== own;
      if (mismatch) sel.value = '';
    }
  }
  await load();
  saveUserPrefs();
}

async function load() {
  await loadMeta();
  // Ensure campaign dropdown reflects current owner selection
  const ownerVal = document.getElementById('owner-header')?.value || '';
  if (document.getElementById('campaign-filter').options.length <= 1 && _allCampaigns.length) {
    populateCampaignDropdown(ownerVal);
  }

  // Apply saved owner + campaign now that both dropdowns are fully populated
  if (_loadedPrefs && !_prefsReady) {
    const ownerSel = document.getElementById('owner-header');
    if (ownerSel && _loadedPrefs.owner !== undefined) {
      ownerSel.value = _loadedPrefs.owner;
      // Repopulate campaign dropdown for the restored owner, preserving saved campaign
      populateCampaignDropdown(_loadedPrefs.owner);
    }
    const campSel = document.getElementById('campaign-filter');
    if (campSel && _loadedPrefs.campaign !== undefined) {
      if ([...campSel.options].some(o => o.value === _loadedPrefs.campaign))
        campSel.value = _loadedPrefs.campaign;
    }
  }

  setTbody('<tr><td colspan="10" class="text-center py-5" style="color:var(--bb-muted)">'
    + '<div class="spinner-border spinner-border-sm me-2"></div>Loading…</td></tr>');
  document.getElementById('follow-empty').style.display = 'none';
  document.getElementById('count-badge').textContent = '';
  setFeedback(null);

  try {
    const _camp  = document.getElementById('campaign-filter')?.value || '';
    const _owner = document.getElementById('owner-header')?.value || '';
    const params = new URLSearchParams();
    if (_camp)  params.set('campaign_id', _camp);
    if (_owner && !_camp) params.set('owner', _owner);
    const _url  = BASE + '/api/crm/followup-contacts' + (params.toString() ? '?' + params.toString() : '');
    const data  = await fetchJSON(_url);
    const contacts = data.contacts || [];

    allRows = contacts.map(c => ({
      name:               c.name               || '',
      email:              c.email              || '',
      title:              c.title              || '',
      website:            c.website            || '',
      phone:              c.phone              || '',
      linkedin:           c.linkedin           || '',
      twitter:            c.twitter            || '',
      facebook:           c.facebook           || '',
      instagram:          c.instagram          || '',
      whatsapp:           c.whatsapp           || '',
      teams:              c.teams              || '',
      telegram:           c.telegram           || '',
      googlechat:         c.googlechat         || '',
      messenger:          c.messenger          || '',
      status:             c.status             || 'pending',
      followup_date:      c.followup_date      || '',
      followup_status:    c.followup_status    || '',
      followup_comment:   c.followup_comment   || '',
      followup_importance: c.followup_importance || '',
      followup_owner:     c.followup_owner     || '',
      comment_history:    c.comment_history    || [],
      campaign_id:        c.campaign_id,
      doc_id:             c.doc_id,
      doc_path:           c.doc_path,
      owner:              c.owner              || '',
      outreach_email:     c.outreach_email     || '',
      new_mail:           !!c.new_mail,
    }));

    // Apply all remaining prefs (static controls: filters, view, sort) after first load
    if (_loadedPrefs && !_prefsReady) {
      const sv = (id, v) => { if (v !== undefined) { const el = document.getElementById(id); if (el) el.value = v; } };
      if (_loadedPrefs.sync_period) { const sp = document.getElementById('sync-period'); if (sp) sp.value = _loadedPrefs.sync_period; }
      if (_loadedPrefs.view && _loadedPrefs.view !== _currentView) {
        _currentView = _loadedPrefs.view;
        document.getElementById('view-list-btn').className = 'btn btn-sm ' + (_currentView === 'list' ? 'btn-primary' : 'btn-outline-secondary');
        document.getElementById('view-group-btn').className = 'btn btn-sm ' + (_currentView === 'group' ? 'btn-primary' : 'btn-outline-secondary');
        const _gs = document.getElementById('group-selectors');
        if (_gs) _gs.style.display = _currentView === 'group' ? 'flex' : 'none';
      }
      const gp = document.getElementById('group-primary');   if (gp && _loadedPrefs.group_primary) gp.value = _loadedPrefs.group_primary;
      const gs2 = document.getElementById('group-secondary'); if (gs2 && _loadedPrefs.group_secondary !== undefined) gs2.value = _loadedPrefs.group_secondary;
      sv('search',                _loadedPrefs.search);
      sv('followup-filter',       _loadedPrefs.filter_followup_status);
      sv('importance-filter',     _loadedPrefs.filter_importance);
      sv('contact-status-filter', _loadedPrefs.filter_contact_status);
      sv('due-filter',            _loadedPrefs.filter_due);
      if (_loadedPrefs.sort_col !== undefined) _sortCol = _loadedPrefs.sort_col;
      if (_loadedPrefs.sort_asc !== undefined) _sortAsc  = _loadedPrefs.sort_asc;
      if (_loadedPrefs.side_open) { _sideOpen = true; _updateSidePanelBtn(); _updateSidePanelVisibility(); }
      if (_loadedPrefs.sp_channels_open !== undefined) _spChannelsOpen = !!_loadedPrefs.sp_channels_open;
      if (_loadedPrefs.sp_company_open  !== undefined) _spCompanyOpen  = !!_loadedPrefs.sp_company_open;
      if (_sortCol) {
        document.querySelectorAll('.bb-sortable').forEach(th => {
          const ic = th.querySelector('.sort-icon'); if (!ic) return;
          if (th.dataset.col === _sortCol) { ic.textContent = _sortAsc ? ' ▲' : ' ▼'; th.style.color = 'var(--bb-accent)'; }
          else { ic.textContent = ''; th.style.color = ''; }
        });
      }
    }
    _prefsReady = true;
    applyFilter();
  } catch (e) {
    setTbody(`<tr><td colspan="10" class="text-center py-5 text-danger small">
      <i class="ti ti-alert-circle me-1"></i>${escapeHtml(e.message)}</td></tr>`);
    console.error('[crm_follow] load error:', e);
  }
}

function populateSelect(id, values, placeholder) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = `<option value="">${escapeHtml(placeholder)}</option>`
    + values.map(v => `<option value="${escapeHtml(v)}"${v === cur ? ' selected' : ''}>${escapeHtml(v)}</option>`).join('');
}

// Refresh a single contact's history via API after an async job completes.
async function refreshContactHistory(gidx) {
  const row = allRows[gidx];
  if (!row) return;
  try {
    const data = await fetchJSON(
      `${BASE}/api/crm/campaigns/${encodeURIComponent(row.campaign_id)}/contacts/${encodeURIComponent(row.doc_id)}`
    );
    row.comment_history = data.comment_history || [];
    refreshHistoryPanel(gidx);
  } catch(e) {
    console.warn('[refresh-history]', e);
  }
}

// ── API write helper ──────────────────────────────────────────────────────────

async function apiPatchContact(row, fields) {
  const user = (window._authUser && (window._authUser.email || window._authUser.uid)) || 'unknown';
  return fetchJSON(
    `${BASE}/api/crm/campaigns/${encodeURIComponent(row.campaign_id)}/contacts/${encodeURIComponent(row.doc_id)}`,
    {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ ...fields, _user: user }),
    }
  );
}

// ── Sort ──────────────────────────────────────────────────────────────────────

function sortBy(col) {
  if (_sortCol === col) { _sortAsc = !_sortAsc; }
  else { _sortCol = col; _sortAsc = true; }
  document.querySelectorAll('.bb-sortable').forEach(th => {
    const ic = th.querySelector('.sort-icon');
    if (th.dataset.col === col) { ic.textContent = _sortAsc ? ' ▲' : ' ▼'; th.style.color = 'var(--bb-accent)'; }
    else { ic.textContent = ''; th.style.color = ''; }
  });
  applyFilter();
  saveUserPrefs();
}

function applySort(list) {
  if (!_sortCol) return list;
  return [...list].sort((a, b) => {
    const va = String(a[_sortCol] || '').toLowerCase();
    const vb = String(b[_sortCol] || '').toLowerCase();
    return _sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}


// ── View toggle ───────────────────────────────────────────────────────────────

function toggleView(v) {
  _currentView = v;
  document.getElementById('view-list-btn').className =
    'btn btn-sm ' + (v === 'list' ? 'btn-primary' : 'btn-outline-secondary');
  document.getElementById('view-group-btn').className =
    'btn btn-sm ' + (v === 'group' ? 'btn-primary' : 'btn-outline-secondary');
  const gs = document.getElementById('group-selectors');
  if (gs) gs.style.display = v === 'group' ? 'flex' : 'none';
  _collapsedGroups.clear();
  applyFilter();
  saveUserPrefs();
}


function toggleGroup(key) {
  if (_collapsedGroups.has(key)) _collapsedGroups.delete(key);
  else _collapsedGroups.add(key);
  applyFilter();
}

function toggleAllGroups() {
  const allCollapsed = _currentGroupKeys.length > 0 && _currentGroupKeys.every(k => _collapsedGroups.has(k));
  if (allCollapsed) {
    _collapsedGroups.clear();
  } else {
    _currentGroupKeys.forEach(k => _collapsedGroups.add(k));
  }
  applyFilter();
}

// ── Filter ────────────────────────────────────────────────────────────────────

function applyFilter() {
  if (_prefsReady) _savePrefsDebounced();
  const q   = document.getElementById('search').value.toLowerCase();

  const fu  = document.getElementById('followup-filter').value;
  const imp = document.getElementById('importance-filter').value;
  const cst = document.getElementById('contact-status-filter').value;
  const due = document.getElementById('due-filter').value;

  const today   = _today();
  const weekEnd = _weekEnd();

  let list = allRows.filter(r => {
    if (fu === '__none__') { if (r.followup_status) return false; }
    else if (fu && r.followup_status !== fu) return false;
    if (imp === '__none__') { if (r.followup_importance) return false; }
    else if (imp && r.followup_importance !== imp) return false;
    if (cst === 'open' && r.status === 'sent') return false;
    else if (cst && cst !== 'open' && r.status !== cst) return false;
    if (due === 'none'    && r.followup_date) return false;
    if (due === 'overdue' && !(r.followup_date && r.followup_date < today)) return false;
    if (due === 'today'   && r.followup_date !== today) return false;
    if (due === 'week'    && !(r.followup_date && r.followup_date >= today && r.followup_date <= weekEnd)) return false;
    if (q) {
      const hay = [r.name, r.email, r.website, r.title].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  list = applySort(list);
  document.getElementById('count-badge').textContent =
    `${list.length} contact${list.length === 1 ? '' : 's'}`;
  render(list);
}

// ── Render ────────────────────────────────────────────────────────────────────

const IMPORTANCE_LEVELS = [
  { value: '',       label: '— —',    cls: 'imp-none'   },
  { value: 'low',    label: 'Low',    cls: 'imp-low'    },
  { value: 'medium', label: 'Medium', cls: 'imp-medium' },
  { value: 'high',   label: 'High',   cls: 'imp-high'   }
];

const FU_STATUSES = [
  { value: '',               label: '— none —' },
  { value: 'open',           label: 'Open' },
  { value: 'contacted',      label: 'Contacted' },
  { value: 'send_mail',      label: 'Send mail' },
  { value: 'replied',        label: 'Replied' },
  { value: 'meeting',        label: 'Meeting booked' },
  { value: 'offer_sent',     label: 'Offer sent' },
  { value: 'accepted',       label: 'Accepted offer' },
  { value: 'closed',         label: 'Closed' },
  { value: 'not_interested', label: 'Not interested' }
];
const GROUP_FIELDS = {
  followup_status: {
    label:   'Follow-up status',
    order:   FU_STATUSES.map(s => s.value),
    labelFn: v => (FU_STATUSES.find(s => s.value === v) || { label: 'No status' }).label,
  },
  followup_importance: {
    label:   'Importance',
    order:   ['high', 'medium', 'low', ''],
    labelFn: v => (IMPORTANCE_LEVELS.find(i => i.value === v) || { label: '— —' }).label,
  },
  owner: {
    label:   'Owner',
    order:   null,
    labelFn: v => v || '(no owner)',
  },
  followup_owner: {
    label:   'Follow-up owner',
    order:   null,
    labelFn: v => v || '(unassigned)',
  },
  followup_date: {
    label:   'Follow-up date',
    order:   null,
    labelFn: v => {
      if (!v) return 'No date set';
      try { return new Date(v + 'T00:00:00').toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }); }
      catch(e) { return v; }
    },
  },
};


function statusBadge(s) {
  const map = { pending: 'bb-badge-pending', sent: 'bb-badge-sent',
                excluded: 'bb-badge-excluded', dosend: 'bb-badge-dosend', error: 'bb-badge-error' };
  return `<span class="bb-badge ${map[s] || 'bb-badge-muted'}">${escapeHtml(s || 'pending')}</span>`;
}

function render(list) {
  if (_currentView === 'group') { renderGrouped(list); return; }
  const empty = document.getElementById('follow-empty');
  if (!list.length) { setTbody(''); empty.style.display = ''; return; }
  empty.style.display = 'none';

  const restoreChecks = () => {
    document.querySelectorAll('.row-chk').forEach(c => {
      const row = allRows[parseInt(c.dataset.gidx, 10)];
      if (row && selected.has(row.doc_path)) c.checked = true;
    });
    const sa = document.getElementById('select-all');
    const all = document.querySelectorAll('.row-chk');
    if (sa && all.length) sa.checked = all.length > 0 && [...all].every(c => c.checked);
  };

  setTbody(list.map(r => {
    const gidx      = allRows.indexOf(r);
    const siteShort = r.website
      ? r.website.replace(/^https?:\/\//, '').replace(/\/$/, '').slice(0, 30) : '';
    const fuOpts    = FU_STATUSES.map(s =>
      `<option value="${s.value}"${r.followup_status === s.value ? ' selected' : ''}>${escapeHtml(s.label)}</option>`
    ).join('');
    const impCls  = (IMPORTANCE_LEVELS.find(i => i.value === r.followup_importance) || IMPORTANCE_LEVELS[0]).cls;
    const dueCls  = dueDateClass(r.followup_date);
    const rowCls  = dueCls === 'overdue' ? 'row-overdue' : (dueCls === 'due-soon' || dueCls === 'due-today') ? 'row-due-soon' : '';
    const dateCls = dueCls === 'overdue' ? 'date-overdue' : (dueCls === 'due-soon' || dueCls === 'due-today') ? 'date-due-soon' : '';

    return `<tr data-doc="${escapeHtml(r.doc_path)}" class="follow-data-row ${rowCls}" onclick="onRowClick(event,${gidx})" style="cursor:pointer">
      <td class="text-center"><input type="checkbox" class="form-check-input row-chk"
        data-gidx="${gidx}" onchange="onRowCheck(this)"></td>
      <td class="d-none d-lg-table-cell">${statusBadge(r.status)}</td>
      <td class="d-none d-xl-table-cell">
        <div class="d-flex align-items-center gap-1">
          <input type="text" class="follow-input small fw-500"
            value="${escapeHtml(r.name || '')}" placeholder="Name"
            data-gidx="${gidx}" data-field="name"
            onchange="saveField(this)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
          <button class="sync-btn flex-shrink-0" onclick="syncContactEmails(${gidx}, this)" title="Sync emails for this contact">
            <i class="ti ti-mail-bolt"></i>
          </button>
        </div>
        <input type="text" class="follow-input contact-title"
          value="${escapeHtml(r.title || '')}" placeholder="Title…"
          data-gidx="${gidx}" data-field="title"
          onchange="saveField(this)"

function _orderedGroupKeys(rows, field, def) {
  const vals = [...new Set(rows.map(r => r[field] || ''))];
  if (def.order) {
    const ordered = def.order.filter(v => vals.includes(v));
    const extra   = vals.filter(v => !def.order.includes(v)).sort();
    return [...ordered, ...extra];
  }
  // Natural sort; always put empty string last
  const nonEmpty = vals.filter(v => v !== '').sort();
  return vals.includes('') ? [...nonEmpty, ''] : nonEmpty;
}

function renderGrouped(list) {
  const empty = document.getElementById('follow-empty');
  if (!list.length) { setTbody(''); empty.style.display = ''; return; }
  empty.style.display = 'none';

  const primaryField   = document.getElementById('group-primary')?.value  || 'followup_status';
  const secondaryField = document.getElementById('group-secondary')?.value || '';
  const pDef = GROUP_FIELDS[primaryField]                   || GROUP_FIELDS.followup_status;
  const sDef = secondaryField ? (GROUP_FIELDS[secondaryField] || null) : null;

  const pKeys = _orderedGroupKeys(list, primaryField, pDef);
  _currentGroupKeys = pKeys.map(pVal => 'p:' + primaryField + ':' + pVal);

  // Update collapse-all button label
  const cab = document.getElementById('collapse-all-btn');
  if (cab) {
    const allCollapsed = _currentGroupKeys.length > 0 && _currentGroupKeys.every(k => _collapsedGroups.has(k));
    cab.innerHTML = allCollapsed
      ? '<i class="ti ti-arrows-maximize"></i>'
      : '<i class="ti ti-arrows-minimize"></i>';
    cab.title = allCollapsed ? 'Expand all groups' : 'Collapse all groups';
  }

  let html = '';

  _groupDocPaths = {};

  pKeys.forEach(pVal => {
    const pRows      = list.filter(r => (r[primaryField] || '') === pVal);
    const pLabel     = pDef.labelFn(pVal);
    const pKey       = 'p:' + primaryField + ':' + pVal;
    const pCollapsed = _collapsedGroups.has(pKey);

    _groupDocPaths[pKey] = pRows.map(r => r.doc_path);

    html += `<tr class="group-header-row" data-group-hdr="${escapeHtml(pKey)}" onclick="toggleGroup('${escapeHtml(pKey)}')">
      <td colspan="10"><input type="checkbox" class="form-check-input group-chk" data-gkey="${escapeHtml(pKey)}" onclick="toggleGroupSelect(event,'${escapeHtml(pKey)}')" tabindex="-1"><i class="ti ti-tag me-1"></i>${escapeHtml(pLabel)}<span class="group-count">${pRows.length} contact${pRows.length === 1 ? '' : 's'}</span><i class="ti ti-chevron-down group-chevron${pCollapsed ? ' collapsed' : ''}"></i></td>
    </tr>`;

    if (pCollapsed) return;

    if (sDef) {
      const sKeys = _orderedGroupKeys(pRows, secondaryField, sDef);
      sKeys.forEach(sVal => {
        const sRows      = pRows.filter(r => (r[secondaryField] || '') === sVal);
        const sLabel     = sDef.labelFn(sVal);
        const sKey       = 's:' + primaryField + ':' + pVal + ':' + secondaryField + ':' + sVal;
        const sCollapsed = _collapsedGroups.has(sKey);

        _groupDocPaths[sKey] = sRows.map(r => r.doc_path);

        html += `<tr class="group-subheader-row" data-group-hdr="${escapeHtml(sKey)}" onclick="toggleGroup('${escapeHtml(sKey)}')">
          <td colspan="10"><input type="checkbox" class="form-check-input group-chk" data-gkey="${escapeHtml(sKey)}" onclick="toggleGroupSelect(event,'${escapeHtml(sKey)}')" tabindex="-1"><i class="ti ti-corner-down-right me-1"></i>${escapeHtml(sLabel)}<span class="group-count">${sRows.length} contact${sRows.length === 1 ? '' : 's'}</span><i class="ti ti-chevron-down group-chevron${sCollapsed ? ' collapsed' : ''}"></i></td>
        </tr>`;

        if (!sCollapsed) html += sRows.map(r => _contactRowsHtml(r)).join('');
      });
    } else {
      html += pRows.map(r => _contactRowsHtml(r)).join('');
    }
  });

  setTbody(html);
  document.querySelectorAll('.row-chk').forEach(c => {
    const row = allRows[parseInt(c.dataset.gidx, 10)];
    if (row && selected.has(row.doc_path)) c.checked = true;
  });
  const sa = document.getElementById('select-all');
  const all = document.querySelectorAll('.row-chk');
  if (sa && all.length) sa.checked = all.length > 0 && [...all].every(c => c.checked);
  _syncGroupCheckboxes();
}

function onRowClick(event, gidx) {
  if (event.target.closest('button,a,label,select')) return;
  onRowExpand(gidx);            // expand comment/history for this row
  if (!_sideOpen) return;
  if (_sidePanelGidx === gidx) return;
  openSidePanel(gidx);
}

function toggleSidePanel() {
  _sideOpen = !_sideOpen;
  _updateSidePanelBtn();
  _updateSidePanelVisibility();
  saveUserPrefs();
}

function closeSidePanel() {
  _sideOpen = false;
  _sidePanelGidx = -1;
  _updateSidePanelBtn();
  _updateSidePanelVisibility();
  document.querySelectorAll('tr.row-sp-active').forEach(tr => tr.classList.remove('row-sp-active'));
  saveUserPrefs();
}

function toggleSpChannels() {
  _spChannelsOpen = !_spChannelsOpen;
  if (_prefsReady) saveUserPrefs();
  const body = document.querySelector('.sp-channels-body');
  const icon = document.querySelector('.sp-channels-section .sp-collapsible .ti');
  if (body) body.style.display = _spChannelsOpen ? 'block' : 'none';
  if (icon) { icon.classList.toggle('ti-chevron-up', _spChannelsOpen); icon.classList.toggle('ti-chevron-down', !_spChannelsOpen); }
}

async function logChatOpened(gidx, url) {
  window.open(url, '_blank', 'noopener');
  const row = allRows[gidx];
  if (!row) return;
  const today = new Date().toISOString().slice(0, 10);
  const alreadyToday = (row.comment_history || []).some(
    h => h.type === 'CHAT' && (h.date || '').slice(0, 10) === today
  );
  if (alreadyToday) return;
  const now  = new Date();
  const hhmm = now.toTimeString().slice(0, 5);
  const entry = { text: `Google Chat opened ${hhmm}`, type: 'CHAT', date: now.toISOString() };
  try {
    await apiPatchContact(row, { _history_entry: entry });
    row.comment_history = row.comment_history || [];
    row.comment_history.push({ ...entry, user: (window._authUser && window._authUser.email) || '' });
    if (_sidePanelGidx === gidx) _refreshSidePanelHistory();
  } catch(e) { console.warn('[chat-log]', e.message); }
}

async function ackNewMail(gidx, event) {
  if (event) event.stopPropagation();
  const row = allRows[gidx];
  if (!row || !row.new_mail) return;
  const now = new Date();
  const hhmm = now.toTimeString().slice(0, 5);
  const entry = { text: `New mail acknowledged ${hhmm}`, type: 'NEWMAIL_ACK', date: now.toISOString() };
  try {
    await apiPatchContact(row, { new_mail: false, _history_entry: entry });
    row.new_mail = false;
    row.comment_history = row.comment_history || [];
    row.comment_history.push({ ...entry, user: (window._authUser && window._authUser.email) || '' });
    // Re-render: update badge in row
    const tr = document.querySelector(`tr[data-doc="${CSS.escape(row.doc_path)}"]`);
    if (tr) {
      const btn = tr.querySelector('.newmail-btn');
      if (btn) btn.remove();
    }
    // Refresh side panel if open on this contact
    if (_sidePanelGidx === gidx) _refreshSidePanelHistory();
    if (_sidePanelGidx === gidx) openSidePanel(gidx);
  } catch(e) { console.warn('[ack-newmail]', e.message); }
}

function _updateSidePanelBtn() {
  const btn = document.getElementById('side-panel-btn');
  if (!btn) return;
  btn.className = 'btn btn-sm ' + (_sideOpen ? 'btn-primary' : 'btn-outline-secondary');
}

function _updateSidePanelVisibility() {
  const panel = document.getElementById('contact-side-panel');
  if (!panel) return;
  if (_sideOpen) panel.classList.add('sp-open');
  else panel.classList.remove('sp-open');
}

function openSidePanel(gidx) {
  _sidePanelGidx = gidx;
  const row = allRows[gidx];
  if (!row) return;
  document.querySelectorAll('tr.row-sp-active').forEach(tr => tr.classList.remove('row-sp-active'));
  const tr = document.querySelector(`tr[data-doc="${CSS.escape(row.doc_path)}"]`);
  if (tr) tr.classList.add('row-sp-active');
  try {
    document.getElementById('sp-body').innerHTML = _renderSidePanel(row);
    _loadSpCompany(row);
  } catch(e) {
    console.error('[side-panel] render error:', e);
    document.getElementById('sp-body').innerHTML =
      `<div class="sp-section small text-danger p-3">⚠ Render error: ${escapeHtml(e.message)}</div>`;
  }
}

  if (icon) { icon.classList.toggle('ti-chevron-up', _spCompanyOpen); icon.classList.toggle('ti-chevron-down', !_spCompanyOpen); }

async function _loadSpCompany(r) {
  const section = document.getElementById('sp-company-section');
  if (!section) return;
  const body = section.querySelector('.sp-company-body');
  if (!body) return;
  if (!r.website) {
    body.innerHTML = '<div class="small sp-muted py-1">No website on this contact.</div>';
    return;
  }
  const domain = r.website.replace(/^https?:\/\//, '').replace(/\/$/, '').split('/')[0];
  try {
    const resp = await fetch(`${BASE}/api/crm/leads/by-domain/${encodeURIComponent(domain)}`);
    if (!resp.ok) { body.innerHTML = '<div class="small sp-muted py-1">No company data found.</div>'; return; }
    const d = await resp.json();
    const LABEL = {
      location:              'Location',
      location_country:      'Country',
      ai_company_type:       'Type',
      ai_sector:             'Sector',
      ai_platform:           'Platform',
      page_count:            'Pages',
      title:                 'Page title',
      description:           'Description',
      ai_summary:            'AI summary',
      ai_reseller_potential: 'Reseller potential',
      ai_client_base:        'Client base',
      reseller_score:        'Score',
      ai_specialisation:     'Specialisation',
    };
    const ORDER = Object.keys(LABEL);
    let rows = '';
    for (const key of ORDER) {
      const val = d[key];
      if (val === undefined || val === null || val === '' || (Array.isArray(val) && !val.length)) continue;
      let display = '';
      if (Array.isArray(val)) {
        display = val.map(v => `<span class="bb-pill">${escapeHtml(String(v))}</span>`).join('');
      } else if (key === 'ai_summary') {
        display = `<em style="font-size:11px;line-height:1.5;color:#555">${escapeHtml(String(val))}</em>`;
      } else if (key === 'description') {
        display = `<span style="font-size:11px;line-height:1.5;color:#555">${escapeHtml(String(val))}</span>`;
      } else if (key === 'ai_reseller_potential') {
        const color = val === 'high' ? '#15803d' : val === 'medium' ? '#92400e' : '#6b7280';
        display = `<span style="font-weight:500;color:${color}">${escapeHtml(String(val))}</span>`;
      } else if (key === 'page_count') {
        const band = val > 100000 ? 'ultra' : val > 10000 ? 'huge' : val > 3000 ? 'large' : val > 500 ? 'medium' : val > 50 ? 'small' : 'micro';
        display = `${Number(val).toLocaleString()} <span style="font-size:11px;color:var(--bb-muted)">(${band})</span>`;
      } else {
        display = escapeHtml(String(val));
      }
      rows += `<div class="bb-field-label">${LABEL[key]}</div><div class="bb-field-value">${display}</div>`;
    }
    const pipeBadge = d.source_pipeline === 'leads'
      ? '<span class="bb-pill" style="background:#dcfce7;color:#15803d;margin-bottom:6px;display:inline-block">leads pipeline</span>'
      : d.source_pipeline === 'site_leads'
        ? '<span class="bb-pill" style="background:#dbeafe;color:#1d4ed8;margin-bottom:6px;display:inline-block">site pipeline</span>'
        : '';
    if (d.company) {
      const companyEl = section.querySelector('.sp-section-label');
      if (companyEl) companyEl.innerHTML = `<i class="ti ti-building me-1" style="font-size:13px"></i>${escapeHtml(d.company)} <i class="ti ${_spCompanyOpen ? 'ti-chevron-up' : 'ti-chevron-down'} ms-1" style="font-size:12px;vertical-align:middle"></i>`;
    }
    if (!rows) {
      body.innerHTML = pipeBadge + '<div class="small sp-muted py-1">No detailed company data.</div>';
    } else {
      body.innerHTML = (pipeBadge ? `<div>${pipeBadge}</div>` : '') + `<div class="bb-field-grid sp-company-grid">${rows}</div>`;
    }
  } catch(e) {
    body.innerHTML = `<div class="small text-danger py-1">Error: ${escapeHtml(e.message)}</div>`;
  }
}

function _spHistoryHtml(r) {
  if (!r.comment_history || !r.comment_history.length) return '<div class="small sp-muted">No history yet.</div>';
  return `<div class="sp-section-label">History (${r.comment_history.length})</div>` +

}

function _refreshSidePanelHistory() {

async function saveField(el) {
  const gidx  = parseInt(el.dataset.gidx, 10);
  const field = el.dataset.field;
  const value = el.value;
  const row   = allRows[gidx];
  if (!row) return;

  if ((row[field] || '') === value) return;
  const oldValue = row[field] || '';
  row[field] = value;

  const container = el.closest('td') || el.closest('.sp-row');
  let dot = container ? container.querySelector('.save-dot') : null;
  if (container) {
    if (!dot) { dot = document.createElement('span'); dot.className = 'save-dot'; container.appendChild(dot); }
    dot.classList.remove('err', 'ok');
    dot.title = '';
  }

  try {
    await apiPatchContact(row, { [field]: value });

    const user = (window._authUser && (window._authUser.email || window._authUser.uid)) || 'unknown';
    const entry = buildLocalHistoryEntry(field, value, user);
    if (entry) {
      row.comment_history.push(entry);
      refreshHistoryPanel(gidx);
      if (_sidePanelGidx === gidx) _refreshSidePanelHistory();
    }

    // Sync other DOM inputs for the same field (table ↔ side panel)
    document.querySelectorAll(`[data-gidx="${gidx}"][data-field="${field}"]`).forEach(other => {
      if (other !== el) other.value = value;
    });

    if (dot) { dot.classList.add('ok'); setTimeout(() => dot.remove(), 900); }
  } catch (e) {
    console.error('[crm_follow] save failed:', e.message);
    row[field] = oldValue;
    if (dot) { dot.classList.add('err'); dot.title = 'Save failed: ' + e.message; }
  }
}

function buildLocalHistoryEntry(field, value, user) {
  const typeMap = {
    followup_status:     'STATUS',
    followup_comment:    'COMMENT',
    followup_date:       'FOLLOWUP',
    followup_importance: 'IMPORTANCE',
    followup_owner:      'OWNER',
  };
  const textMap = {
    followup_status:     v => { const l = (FU_STATUSES.find(s => s.value === v) || {}).label || v || '(none)'; return `Status → ${l}`; },
    followup_comment:    v => v || '(comment cleared)',
    followup_date:       v => v ? `Follow-up date set to ${v}` : 'Follow-up date cleared',
    followup_importance: v => { const l = (IMPORTANCE_LEVELS.find(i => i.value === v) || {}).label || v || '(none)'; return `Importance → ${l}`; },
    followup_owner:      v => v ? `Owner → ${v}` : 'Owner cleared',
  };
  if (!typeMap[field]) return null;
  return { date: new Date().toISOString(), user, text: textMap[field](value), type: typeMap[field] };
}

function getSyncCutoff() {

async function applyBatchDate() {
  const date    = document.getElementById('batch-date-input').value;
  const comment = document.getElementById('batch-date-comment').value.trim();
  const statusEl = document.getElementById('batch-date-status');
  if (!date) { statusEl.style.color = '#dc2626'; statusEl.textContent = 'Please pick a date first.'; return; }

  const rows = allRows.filter(r => selected.has(r.doc_path));
  if (!rows.length) return;

  statusEl.style.color = 'var(--bb-muted)';
  statusEl.textContent = `Updating ${rows.length} contact${rows.length === 1 ? '' : 's'}…`;

  let done = 0, errors = 0;
  await Promise.all(rows.map(async r => {
    try {
      const statusVal = document.getElementById('batch-date-status-select').value;
      const fields = { followup_date: date };
      if (comment)   fields.followup_comment  = comment;
      if (statusVal) fields.followup_status   = statusVal;
      await apiPatchContact(r, fields);
      r.followup_date = date;
      if (comment)   r.followup_comment = comment;
      if (statusVal) r.followup_status  = statusVal;
      const user = (window._authUser && (window._authUser.email || window._authUser.uid)) || 'unknown';
      r.comment_history.push({ date: new Date().toISOString(), user,
        text: comment ? `Follow-up date set to ${date} — ${comment}` : `Follow-up date set to ${date}`,
        type: 'FOLLOWUP' });
      done++;
    } catch (e) { errors++; console.error('[batch-date]', r.email, e.message); }
  }));

  if (errors) { statusEl.style.color = '#dc2626'; statusEl.textContent = `${done} updated, ${errors} failed.`; }
  else        { statusEl.style.color = '#15803d'; statusEl.textContent = `${done} contact${done === 1 ? '' : 's'} updated.`; }

  applyFilter();
  if (!errors) { hideBatchDatePanel(); clearSelection(); }
}
