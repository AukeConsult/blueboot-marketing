<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueboot — CRM Follow-up</title>
<link rel="stylesheet" href="vendor/bootstrap.min.css">
<link rel="stylesheet" href="vendor/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
<style>

.follow-input {
  border: 1px solid transparent; background: transparent;
  font-size: .8rem; width: 100%; padding: 2px 4px; border-radius: 4px;
  transition: border-color .15s, background .15s;
}
.follow-input:hover { border-color: var(--bb-border); background: #fff; }
.follow-input:focus { border-color: var(--bb-accent); background: #fff; outline: none;
  box-shadow: 0 0 0 2px rgba(79,110,247,.15); }
.follow-input::placeholder { color: var(--bb-muted); font-size: .78rem; }
.contact-title { font-size: .73rem; color: var(--bb-muted); }

.follow-select {
  border: 1px solid transparent; background: transparent;
  font-size: .8rem; padding: 2px 4px; border-radius: 4px; cursor: pointer; width: 100%;
  transition: border-color .15s, background .15s;
}
.follow-select:hover { border-color: var(--bb-border); background: #fff; }
.follow-select:focus { border-color: var(--bb-accent); background: #fff; outline: none; }

.save-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--bb-accent); margin-left: 4px; vertical-align: middle;
  animation: dot-blink .6s ease-in-out infinite;
}
.save-dot.err { background: #dc2626; animation: none; }
.save-dot.ok  { background: #16a34a; animation: none; }
@keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* Comment row — visually attached to the row above it */
.follow-comment-row td { border-top: none; padding-top: 0; padding-bottom: 4px; }
/* .follow-comment-row .follow-input font — defined in css/styles.css */
.hist-toggle { flex-shrink: 0; background: none; border: none; cursor: pointer;
  color: var(--bb-muted); padding: 0 3px; border-radius: 4px; line-height: 1;
  display: flex; align-items: center; gap: 2px; font-size: .72rem; }
.hist-toggle:hover { color: var(--bb-accent); background: #eef0ff; }
/* .hist-count sizing and comment input font — defined in css/styles.css */

/* History row */
.follow-history-row td { border-top: none; padding-top: 0; padding-bottom: 8px; }
.hist-list { display: flex; flex-direction: column; gap: 4px; padding: 4px 0 0; }
.hist-entry { display: grid; grid-template-columns: 120px 140px 1fr; gap: 6px;
  align-items: baseline; font-size: .76rem; padding: 3px 6px; border-radius: 5px;
  background: #f8f9fa; border: 1px solid var(--bb-border); }
.hist-entry-date { color: var(--bb-muted); white-space: nowrap; }
.hist-entry-user { color: var(--bb-muted); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; }
.hist-entry-text { color: #111; }

/* Importance select */
.imp-select { border: 1px solid transparent; background: transparent;
  font-size: .8rem; padding: 2px 4px; border-radius: 4px; cursor: pointer;
  font-weight: 600; transition: border-color .15s, background .15s; }
.imp-select:focus { outline: none; }
.imp-none   { color: var(--bb-muted); }
.imp-low    { color: #4b5563; background: #f3f4f6; border-color: #d1d5db; }
.imp-medium { color: #92400e; background: #fef3c7; border-color: #fde68a; }
.imp-high   { color: #991b1b; background: #fee2e2; border-color: #fca5a5; }

/* Email sync button on each row */
.sync-btn { background: none; border: none; cursor: pointer; padding: 1px 3px;
  border-radius: 4px; color: var(--bb-muted); font-size: .78rem; line-height: 1; }
.sync-btn:hover { color: var(--bb-accent); background: #eef0ff; }
.sync-btn.spinning i { display: inline-block; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Email history entries */
.hist-entry-email-in  { background: #f0fdf4; border-color: #bbf7d0; }
.hist-entry-email-out { background: #eff6ff; border-color: #bfdbfe; }
.hist-type-badge { font-size: .65rem; font-weight: 700; padding: 1px 5px;
  border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
.hist-type-in  { background: #dcfce7; color: #15803d; }
.hist-type-out { background: #dbeafe; color: #1d4ed8; }

/* Overdue / due-soon date highlighting */
.date-overdue  { color: #b91c1c !important; font-weight: 600; }
.date-due-soon { color: #92400e !important; font-weight: 600; }
tr.row-overdue  > td:first-of-type { border-left: 3px solid #fca5a5; }
tr.row-due-soon > td:first-of-type { border-left: 3px solid #fde68a; }



/* Secondary (nested) group header */
.group-subheader-row td {
  background: #f8f9ff;
  font-weight: 600;
  font-size: .74rem;
  color: #6b7280;
  padding: 4px 10px 4px 28px;
  border-top: 1px solid #e5e7eb;
  cursor: pointer;
  user-select: none;
}
.group-subheader-row td:hover { background: #eff1ff; }
.group-subheader-row .group-count { font-weight: 400; }

/* Collapsible group headers */
.group-header-row td { cursor: pointer; user-select: none; }
.group-header-row td:hover { background: #e4e8ff; }
.group-chevron { float: right; transition: transform .2s; }
.group-chevron.collapsed { transform: rotate(-90deg); }

/* Group view header rows */
.group-header-row td {
  background: #eef0ff;
  font-weight: 600;
  font-size: .78rem;
  color: var(--bb-accent);
  padding: 5px 10px;
  border-top: 2px solid #c7ceff;
  border-bottom: 1px solid #c7ceff;
}
.group-chk {
  vertical-align: middle;
  margin-right: 6px;
  margin-top: -1px;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  z-index: 1;
}
.group-header-row td .group-count {
  font-weight: 400;
  color: var(--bb-muted);
  margin-left: 6px;
}


/* Compact group-by selects in card header */
.group-select {
  border: 1px solid transparent; background: transparent;
  font-size: .76rem; padding: 2px 4px; border-radius: 4px;
  cursor: pointer; color: var(--bb-muted); max-width: 130px;
  transition: border-color .15s, background .15s, color .15s;
}
.group-select:hover { border-color: var(--bb-border); background: #fff; color: #374151; }
.group-select:focus { border-color: var(--bb-accent); background: #fff; color: #374151; outline: none; }

/* Discreet action buttons (collapse-all, sync, refresh) */
.collapse-all-btn, .header-action-btn {
  border: 1px solid transparent; background: transparent;
  color: var(--bb-muted); border-radius: 4px; padding: 2px 7px;
  cursor: pointer; font-size: .78rem; line-height: 1.6; white-space: nowrap;
  transition: border-color .15s, background .15s, color .15s;
}
.collapse-all-btn:hover, .header-action-btn:hover {
  border-color: var(--bb-border); background: #fff; color: var(--bb-accent);
}
.header-action-btn.spinning i { display: inline-block; animation: spin .7s linear infinite; }

/* View toggle buttons */
.view-toggle { display: flex; gap: 2px; }
.view-toggle .btn { padding: 2px 8px; }

/* Batch bar */
.batch-bar { display: flex; align-items: center; gap: .6rem;
  background: #eef0ff; border: 1px solid #c7ceff; border-radius: 8px;
  padding: .45rem .85rem; font-size: .82rem; }
.batch-bar .batch-count { font-weight: 600; color: var(--bb-accent); }
.batch-bar .batch-divider { width: 1px; height: 1rem; background: #c7ceff; margin: 0 .2rem; }

</style>
</head>
<body>

<div id="nav"></div>

<div class="container-fluid py-4 px-4" style="max-width:1600px">

  <div class="page-header mb-3">
    <h5 class="page-title"><i class="ti ti-phone-check text-primary"></i>CRM Follow-up</h5>
    <div class="d-flex align-items-center gap-1">
      <select id="owner-header" class="group-select" title="Filter by owner" onchange="onOwnerChange()" style="max-width:150px">
        <option value="">All owners</option>
      </select>
      <select id="campaign-filter" class="group-select" title="Filter by campaign" onchange="load()" style="max-width:180px">
        <option value="">All campaigns</option>
      </select>
      <select id="outreach-filter" class="group-select" title="Filter by outreach email" onchange="applyFilter()" style="max-width:180px">
        <option value="">All outreach emails</option>
      </select>
      <select id="sync-period" class="group-select" title="Email sync lookback period">
        <option value="7">Sync mail for last 7 days</option>
        <option value="14">Sync mail for last 14 days</option>
        <option value="30">Sync mail for last 30 days</option>
        <option value="90">Sync mail for last 90 days</option>
        <option value="0">Sync mail for all time</option>
      </select>
      <button class="header-action-btn" id="sync-all-btn" onclick="syncAllEmails()" title="Sync all emails">
        <i class="ti ti-mail-bolt me-1"></i>Sync
      </button>
      <button class="header-action-btn" onclick="load()" title="Refresh contacts">
        <i class="ti ti-refresh"></i>
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <input id="search" class="form-control form-control-sm" style="max-width:240px"
      placeholder="Search name, email, website or title…" oninput="applyFilter()">


    <select id="followup-filter" class="form-select form-select-sm" style="max-width:170px" onchange="applyFilter()">
      <option value="">All follow-up statuses</option>
      <option value="__none__">No status set</option>
      <option value="open">Open</option>
      <option value="contacted">Contacted</option>
      <option value="replied">Replied</option>
      <option value="meeting">Meeting booked</option>
      <option value="offer_sent">Offer sent</option>
      <option value="accepted">Accepted offer</option>
      <option value="closed">Closed</option>
      <option value="not_interested">Not interested</option>
    </select>

    <select id="importance-filter" class="form-select form-select-sm" style="max-width:145px" onchange="applyFilter()">
      <option value="">All importances</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
      <option value="__none__">Not set</option>
    </select>

    <select id="contact-status-filter" class="form-select form-select-sm" style="max-width:155px" onchange="applyFilter()">
      <option value="open">Open contacts</option>
      <option value="">All contacts</option>
      <option value="pending">Pending only</option>
      <option value="sent">Sent only</option>
      <option value="excluded">Excluded only</option>
    </select>

    <select id="due-filter" class="form-select form-select-sm" style="max-width:150px" onchange="applyFilter()">
      <option value="">Any date</option>
      <option value="none">No date set</option>
      <option value="overdue">Past due</option>
      <option value="today">Due today</option>
      <option value="week">Due this week</option>
    </select>

    <span id="count-badge" class="small ms-auto" style="color:var(--bb-muted)"></span>
  </div>

  <!-- Batch action bar (visible when rows are selected) -->
  <div id="batch-bar" class="batch-bar mb-3" style="display:none">
    <span class="batch-count" id="batch-count">0</span>
    <span style="color:var(--bb-muted)">selected</span>
    <div class="batch-divider"></div>
    <button class="btn btn-sm btn-outline-secondary py-0" onclick="clearSelection()">
      <i class="ti ti-x me-1"></i>Clear
    </button>
    <div class="batch-divider"></div>
    <button class="btn btn-sm btn-outline-primary py-0" onclick="showBatchDatePanel()">
      <i class="ti ti-calendar me-1"></i>Set follow-up date
    </button>
  </div>

  <!-- Batch date panel -->
  <div id="batch-date-panel" class="bb-card p-3 mb-3" style="display:none">
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <label class="small fw-500 mb-0" style="color:var(--bb-muted)">Date</label>
      <input type="date" id="batch-date-input" class="form-control form-control-sm" style="max-width:160px">
      <label class="small fw-500 mb-0" style="color:var(--bb-muted)">Comment</label>
      <input type="text" id="batch-date-comment" class="form-control form-control-sm" style="max-width:280px" placeholder="Optional note…">
      <button class="btn btn-sm btn-primary" onclick="applyBatchDate()">
        <i class="ti ti-check me-1"></i>Apply to <span id="batch-apply-count">0</span> selected
      </button>
      <button class="btn btn-sm btn-outline-secondary" onclick="hideBatchDatePanel()">Cancel</button>
      <span id="batch-date-status" class="small ms-1" style="color:var(--bb-muted)"></span>
    </div>
  </div>

  <!-- Job status feedback -->
  <div id="sync-feedback" class="alert py-2 px-3 small mb-3" style="display:none"></div>

  <!-- Table -->
  <div class="bb-card">
    <div class="px-3 py-2 d-flex align-items-center justify-content-between border-bottom bb-card-header">
      <span class="fw-500 small"><i class="ti ti-list-check me-1 text-primary"></i>Contacts</span>
      <div class="d-flex align-items-center gap-2">
        <div id="group-selectors" class="d-flex align-items-center gap-1" style="display:none">
          <select id="group-primary" class="group-select" title="Group by" onchange="applyFilter()">
            <option value="followup_status">Status</option>
            <option value="followup_importance">Importance</option>
            <option value="followup_date">Date</option>
            <option value="owner">Owner</option>
          </select>
          <i class="ti ti-chevron-right" style="color:var(--bb-muted);font-size:.7rem"></i>
          <select id="group-secondary" class="group-select" title="Then by" onchange="applyFilter()">
            <option value="">then by…</option>
            <option value="followup_status">Status</option>
            <option value="followup_importance">Importance</option>
            <option value="followup_date">Date</option>
            <option value="owner">Owner</option>
          </select>
          <button id="collapse-all-btn" class="collapse-all-btn" onclick="toggleAllGroups()" title="Collapse all groups">
            <i class="ti ti-arrows-minimize"></i>
          </button>
        </div>
        <div class="view-toggle">
          <button id="view-group-btn" class="btn btn-sm btn-outline-secondary" onclick="toggleView('group')" title="Grouped view">
            <i class="ti ti-layout-rows"></i>
          </button>
          <button id="view-list-btn" class="btn btn-sm btn-primary" onclick="toggleView('list')" title="List view">
            <i class="ti ti-list"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-sm table-hover mb-0">
        <thead class="bb-thead"><tr>
          <th style="width:32px"><input type="checkbox" class="form-check-input" id="select-all" onclick="toggleSelectAll(this)"></th>
          <th class="small bb-sortable" data-col="status"           onclick="sortBy('status')" style="min-width:85px">Status <span class="sort-icon"></span></th>
          <th class="small bb-sortable" data-col="name"             onclick="sortBy('name')">Name <span class="sort-icon"></span></th>
          <th class="small bb-sortable" data-col="email"            onclick="sortBy('email')">Email <span class="sort-icon"></span></th>
          <th class="small" style="min-width:110px">Phone</th>
          <th class="small bb-sortable" data-col="website"          onclick="sortBy('website')" style="min-width:150px">Website <span class="sort-icon"></span></th>
          <th class="small bb-sortable" data-col="followup_date"    onclick="sortBy('followup_date')" style="min-width:135px">Follow-up date <span class="sort-icon"></span></th>
          <th class="small bb-sortable" data-col="followup_status"     onclick="sortBy('followup_status')" style="min-width:150px">Follow-up status <span class="sort-icon"></span></th>
          <th class="small bb-sortable" data-col="followup_importance" onclick="sortBy('followup_importance')" style="min-width:100px">Importance <span class="sort-icon"></span></th>
        </tr></thead>
        <tbody id="follow-tbody">
          <tr><td colspan="9" class="text-center py-5" style="color:var(--bb-muted)">
            <div class="spinner-border spinner-border-sm me-2"></div>Loading…
          </td></tr>
        </tbody>
      </table>
    </div>
    <div id="follow-empty" class="text-center py-3 small" style="color:var(--bb-muted);display:none">
      No contacts match the current filters.
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/crm-common.js"></script>
<script>
'use strict';

let allRows  = [];
let _sortCol = '';
let _sortAsc = true;
let _currentView = 'list';
const _collapsedGroups = new Set();
let _currentGroupKeys = [];
let _allCampaigns = [];   // loaded from /followup-meta
const selected = new Set();   // doc_path strings
let _groupDocPaths = {};              // groupKey -> [doc_path, ...] built by renderGrouped
let _prefsReady       = false;  // true only after first load() completes with prefs applied
let _pendingOutreach  = '';     // outreach pref applied after load() populates dropdown
let _loadedPrefs      = null;   // prefs fetched by loadUserPrefs(); applied inside load()

// ── Load contacts via API (no direct Firestore reads) ─────────────────────────

async function loadMeta() {
  if (_allCampaigns.length) return;   // already loaded
  try {
    const meta = await fetchJSON(BASE + '/api/crm/followup-meta');
    _allCampaigns = meta.campaigns || [];
    const owners = meta.owners || [];
    populateSelect('owner-header', owners, 'All owners');
    // Inject "No owner" option right after "All owners"
    const _ownerSel = document.getElementById('owner-header');
    if (_ownerSel) {
      const _noneOpt = document.createElement('option');
      _noneOpt.value = '__none__'; _noneOpt.textContent = 'No owner';
      _ownerSel.insertBefore(_noneOpt, _ownerSel.options[1]);
    }
  } catch(e) { console.warn('[meta]', e); }
}

function populateCampaignDropdown(ownerVal) {
  const filtered = ownerVal === '__none__'
    ? _allCampaigns.filter(c => !c.owner)
    : ownerVal
      ? _allCampaigns.filter(c => c.owner === ownerVal)
      : _allCampaigns;
  const sel = document.getElementById('campaign-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All campaigns</option>'
    + filtered.map(c => `<option value="${escapeHtml(c.id)}"${c.id === cur ? ' selected' : ''}>${escapeHtml(c.id)}</option>`).join('');
}

async function onOwnerChange() {
  const own = document.getElementById('owner-header').value;
  populateCampaignDropdown(own);
  // Reset campaign if the current selection doesn't belong to the new owner
  const sel = document.getElementById('campaign-filter');
  if (sel.value && own) {
    const camp = _allCampaigns.find(c => c.id === sel.value);
    if (camp) {
      const mismatch = own === '__none__' ? !!camp.owner : camp.owner !== own;
      if (mismatch) sel.value = '';
    }
  }
  await load();
  saveUserPrefs();
}

async function load() {
  await loadMeta();
  // Ensure campaign dropdown reflects current owner selection
  const ownerVal = document.getElementById('owner-header')?.value || '';
  if (document.getElementById('campaign-filter').options.length <= 1 && _allCampaigns.length) {
    populateCampaignDropdown(ownerVal);
  }

  // Apply saved owner + campaign now that both dropdowns are fully populated
  if (_loadedPrefs && !_prefsReady) {
    const ownerSel = document.getElementById('owner-header');
    if (ownerSel && _loadedPrefs.owner !== undefined) {
      ownerSel.value = _loadedPrefs.owner;
      // Repopulate campaign dropdown for the restored owner, preserving saved campaign
      populateCampaignDropdown(_loadedPrefs.owner);
    }
    const campSel = document.getElementById('campaign-filter');
    if (campSel && _loadedPrefs.campaign !== undefined) {
      if ([...campSel.options].some(o => o.value === _loadedPrefs.campaign))
        campSel.value = _loadedPrefs.campaign;
    }
  }

  setTbody('<tr><td colspan="9" class="text-center py-5" style="color:var(--bb-muted)">'
    + '<div class="spinner-border spinner-border-sm me-2"></div>Loading…</td></tr>');
  document.getElementById('follow-empty').style.display = 'none';
  document.getElementById('count-badge').textContent = '';
  setFeedback(null);

  try {
    const _camp  = document.getElementById('campaign-filter')?.value || '';
    const _owner = document.getElementById('owner-header')?.value || '';
    const params = new URLSearchParams();
    if (_camp)  params.set('campaign_id', _camp);
    if (_owner && !_camp) params.set('owner', _owner);
    const _url  = BASE + '/api/crm/followup-contacts' + (params.toString() ? '?' + params.toString() : '');
    const data  = await fetchJSON(_url);
    const contacts = data.contacts || [];

    allRows = contacts.map(c => ({
      name:               c.name               || '',
      email:              c.email              || '',
      title:              c.title              || '',
      website:            c.website            || '',
      phone:              c.phone              || '',
      status:             c.status             || 'pending',
      followup_date:      c.followup_date      || '',
      followup_status:    c.followup_status    || '',
      followup_comment:   c.followup_comment   || '',
      followup_importance: c.followup_importance || '',
      comment_history:    c.comment_history    || [],
      campaign_id:        c.campaign_id,
      doc_id:             c.doc_id,
      doc_path:           c.doc_path,
      owner:              c.owner              || '',
      outreach_email:     c.outreach_email     || '',
    }));

    const outreachEmails = [...new Set(allRows.map(r => r.outreach_email).filter(Boolean))].sort();
    populateSelect('outreach-filter', outreachEmails, 'All outreach emails');
    // Auto-select if only one outreach account
    if (outreachEmails.length === 1) {
      document.getElementById('outreach-filter').value = outreachEmails[0];
    }
    // Apply deferred outreach pref (populated after dropdown is built)
    if (_pendingOutreach) {
      const el = document.getElementById('outreach-filter');
      if ([...el.options].some(o => o.value === _pendingOutreach)) el.value = _pendingOutreach;
      _pendingOutreach = '';
    }
    // Apply all remaining prefs (static controls: filters, view, sort) after first load
    if (_loadedPrefs && !_prefsReady) {
      const sv = (id, v) => { if (v !== undefined) { const el = document.getElementById(id); if (el) el.value = v; } };
      if (_loadedPrefs.sync_period) { const sp = document.getElementById('sync-period'); if (sp) sp.value = _loadedPrefs.sync_period; }
      if (_loadedPrefs.view && _loadedPrefs.view !== _currentView) {
        _currentView = _loadedPrefs.view;
        document.getElementById('view-list-btn').className = 'btn btn-sm ' + (_currentView === 'list' ? 'btn-primary' : 'btn-outline-secondary');
        document.getElementById('view-group-btn').className = 'btn btn-sm ' + (_currentView === 'group' ? 'btn-primary' : 'btn-outline-secondary');
        const _gs = document.getElementById('group-selectors');
        if (_gs) _gs.style.display = _currentView === 'group' ? 'flex' : 'none';
      }
      const gp = document.getElementById('group-primary');   if (gp && _loadedPrefs.group_primary) gp.value = _loadedPrefs.group_primary;
      const gs2 = document.getElementById('group-secondary'); if (gs2 && _loadedPrefs.group_secondary !== undefined) gs2.value = _loadedPrefs.group_secondary;
      sv('search',                _loadedPrefs.search);
      sv('followup-filter',       _loadedPrefs.filter_followup_status);
      sv('importance-filter',     _loadedPrefs.filter_importance);
      sv('contact-status-filter', _loadedPrefs.filter_contact_status);
      sv('due-filter',            _loadedPrefs.filter_due);
      if (_loadedPrefs.sort_col !== undefined) _sortCol = _loadedPrefs.sort_col;
      if (_loadedPrefs.sort_asc !== undefined) _sortAsc  = _loadedPrefs.sort_asc;
      if (_sortCol) {
        document.querySelectorAll('.bb-sortable').forEach(th => {
          const ic = th.querySelector('.sort-icon'); if (!ic) return;
          if (th.dataset.col === _sortCol) { ic.textContent = _sortAsc ? ' ▲' : ' ▼'; th.style.color = 'var(--bb-accent)'; }
          else { ic.textContent = ''; th.style.color = ''; }
        });
      }
    }
    _prefsReady = true;
    applyFilter();
  } catch (e) {
    setTbody(`<tr><td colspan="9" class="text-center py-5 text-danger small">
      <i class="ti ti-alert-circle me-1"></i>${escapeHtml(e.message)}</td></tr>`);
    console.error('[crm_follow] load error:', e);
  }
}

function populateSelect(id, values, placeholder) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = `<option value="">${escapeHtml(placeholder)}</option>`
    + values.map(v => `<option value="${escapeHtml(v)}"${v === cur ? ' selected' : ''}>${escapeHtml(v)}</option>`).join('');
}

// Refresh a single contact's history via API after an async job completes.
async function refreshContactHistory(gidx) {
  const row = allRows[gidx];
  if (!row) return;
  try {
    const data = await fetchJSON(
      `${BASE}/api/crm/campaigns/${encodeURIComponent(row.campaign_id)}/contacts/${encodeURIComponent(row.doc_id)}`
    );
    row.comment_history = data.comment_history || [];
    refreshHistoryPanel(gidx);
  } catch(e) {
    console.warn('[refresh-history]', e);
  }
}

// ── API write helper ──────────────────────────────────────────────────────────

async function apiPatchContact(row, fields) {
  const user = (window._authUser && (window._authUser.email || window._authUser.uid)) || 'unknown';
  return fetchJSON(
    `${BASE}/api/crm/campaigns/${encodeURIComponent(row.campaign_id)}/contacts/${encodeURIComponent(row.doc_id)}`,
    {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ ...fields, _user: user }),
    }
  );
}

// ── Sort ──────────────────────────────────────────────────────────────────────

function sortBy(col) {
  if (_sortCol === col) { _sortAsc = !_sortAsc; }
  else { _sortCol = col; _sortAsc = true; }
  document.querySelectorAll('.bb-sortable').forEach(th => {
    const ic = th.querySelector('.sort-icon');
    if (th.dataset.col === col) { ic.textContent = _sortAsc ? ' ▲' : ' ▼'; th.style.color = 'var(--bb-accent)'; }
    else { ic.textContent = ''; th.style.color = ''; }
  });
  applyFilter();
  saveUserPrefs();
}

function applySort(list) {
  if (!_sortCol) return list;
  return [...list].sort((a, b) => {
    const va = String(a[_sortCol] || '').toLowerCase();
    const vb = String(b[_sortCol] || '').toLowerCase();
    return _sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}


// ── View toggle ───────────────────────────────────────────────────────────────

function toggleView(v) {
  _currentView = v;
  document.getElementById('view-list-btn').className =
    'btn btn-sm ' + (v === 'list' ? 'btn-primary' : 'btn-outline-secondary');
  document.getElementById('view-group-btn').className =
    'btn btn-sm ' + (v === 'group' ? 'btn-primary' : 'btn-outline-secondary');
  const gs = document.getElementById('group-selectors');
  if (gs) gs.style.display = v === 'group' ? 'flex' : 'none';
  _collapsedGroups.clear();
  applyFilter();
  saveUserPrefs();
}


function toggleGroup(key) {
  if (_collapsedGroups.has(key)) _collapsedGroups.delete(key);
  else _collapsedGroups.add(key);
  applyFilter();
}

function toggleAllGroups() {
  const allCollapsed = _currentGroupKeys.length > 0 && _currentGroupKeys.every(k => _collapsedGroups.has(k));
  if (allCollapsed) {
    _collapsedGroups.clear();
  } else {
    _currentGroupKeys.forEach(k => _collapsedGroups.add(k));
  }
  applyFilter();
}

// ── Filter ────────────────────────────────────────────────────────────────────

function applyFilter() {
  if (_prefsReady) _savePrefsDebounced();
  const q   = document.getElementById('search').value.toLowerCase();

  const out = document.getElementById('outreach-filter').value;
  const fu  = document.getElementById('followup-filter').value;
  const imp = document.getElementById('importance-filter').value;
  const cst = document.getElementById('contact-status-filter').value;
  const due = document.getElementById('due-filter').value;

  const today   = _today();
  const weekEnd = _weekEnd();

  let list = allRows.filter(r => {
    if (out && r.outreach_email !== out) return false;
    if (fu === '__none__') { if (r.followup_status) return false; }
    else if (fu && r.followup_status !== fu) return false;
    if (imp === '__none__') { if (r.followup_importance) return false; }
    else if (imp && r.followup_importance !== imp) return false;
    if (cst === 'open' && r.status === 'sent') return false;
    else if (cst && cst !== 'open' && r.status !== cst) return false;
    if (due === 'none'    && r.followup_date) return false;
    if (due === 'overdue' && !(r.followup_date && r.followup_date < today)) return false;
    if (due === 'today'   && r.followup_date !== today) return false;
    if (due === 'week'    && !(r.followup_date && r.followup_date >= today && r.followup_date <= weekEnd)) return false;
    if (q) {
      const hay = [r.name, r.email, r.website, r.title].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  list = applySort(list);
  document.getElementById('count-badge').textContent =
    `${list.length} contact${list.length === 1 ? '' : 's'}`;
  render(list);
}

function _orderedGroupKeys(rows, field, def) {
  const vals = [...new Set(rows.map(r => r[field] || ''))];
  if (def.order) {
    const ordered = def.order.filter(v => vals.includes(v));
    const extra   = vals.filter(v => !def.order.includes(v)).sort();
    return [...ordered, ...extra];
  }
  // Natural sort; always put empty string last
  const nonEmpty = vals.filter(v => v !== '').sort();
  return vals.includes('') ? [...nonEmpty, ''] : nonEmpty;
}

function renderGrouped(list) {
  const empty = document.getElementById('follow-empty');
  if (!list.length) { setTbody(''); empty.style.display = ''; return; }
  empty.style.display = 'none';

  const primaryField   = document.getElementById('group-primary')?.value  || 'followup_status';
  const secondaryField = document.getElementById('group-secondary')?.value || '';
  const pDef = GROUP_FIELDS[primaryField]                   || GROUP_FIELDS.followup_status;
  const sDef = secondaryField ? (GROUP_FIELDS[secondaryField] || null) : null;

  const pKeys = _orderedGroupKeys(list, primaryField, pDef);
  _currentGroupKeys = pKeys.map(pVal => 'p:' + primaryField + ':' + pVal);

  // Update collapse-all button label
  const cab = document.getElementById('collapse-all-btn');
  if (cab) {
    const allCollapsed = _currentGroupKeys.length > 0 && _currentGroupKeys.every(k => _collapsedGroups.has(k));
    cab.innerHTML = allCollapsed
      ? '<i class="ti ti-arrows-maximize"></i>'
      : '<i class="ti ti-arrows-minimize"></i>';
    cab.title = allCollapsed ? 'Expand all groups' : 'Collapse all groups';
  }

  let html = '';

  _groupDocPaths = {};

  pKeys.forEach(pVal => {
    const pRows      = list.filter(r => (r[primaryField] || '') === pVal);
    const pLabel     = pDef.labelFn(pVal);
    const pKey       = 'p:' + primaryField + ':' + pVal;
    const pCollapsed = _collapsedGroups.has(pKey);

    _groupDocPaths[pKey] = pRows.map(r => r.doc_path);

    html += `<tr class="group-header-row" data-group-hdr="${escapeHtml(pKey)}" onclick="toggleGroup('${escapeHtml(pKey)}')">
      <td colspan="9"><input type="checkbox" class="form-check-input group-chk" data-gkey="${escapeHtml(pKey)}" onclick="toggleGroupSelect(event,'${escapeHtml(pKey)}')" tabindex="-1"><i class="ti ti-tag me-1"></i>${escapeHtml(pLabel)}<span class="group-count">${pRows.length} contact${pRows.length === 1 ? '' : 's'}</span><i class="ti ti-chevron-down group-chevron${pCollapsed ? ' collapsed' : ''}"></i></td>
    </tr>`;

    if (pCollapsed) return;

    if (sDef) {
      const sKeys = _orderedGroupKeys(pRows, secondaryField, sDef);
      sKeys.forEach(sVal => {
        const sRows      = pRows.filter(r => (r[secondaryField] || '') === sVal);
        const sLabel     = sDef.labelFn(sVal);
        const sKey       = 's:' + primaryField + ':' + pVal + ':' + secondaryField + ':' + sVal;
        const sCollapsed = _collapsedGroups.has(sKey);

        _groupDocPaths[sKey] = sRows.map(r => r.doc_path);

        html += `<tr class="group-subheader-row" data-group-hdr="${escapeHtml(sKey)}" onclick="toggleGroup('${escapeHtml(sKey)}')">
          <td colspan="9"><input type="checkbox" class="form-check-input group-chk" data-gkey="${escapeHtml(sKey)}" onclick="toggleGroupSelect(event,'${escapeHtml(sKey)}')" tabindex="-1"><i class="ti ti-corner-down-right me-1"></i>${escapeHtml(sLabel)}<span class="group-count">${sRows.length} contact${sRows.length === 1 ? '' : 's'}</span><i class="ti ti-chevron-down group-chevron${sCollapsed ? ' collapsed' : ''}"></i></td>
        </tr>`;

        if (!sCollapsed) html += sRows.map(r => _contactRowsHtml(r)).join('');
      });
    } else {
      html += pRows.map(r => _contactRowsHtml(r)).join('');
    }
  });

  setTbody(html);
  document.querySelectorAll('.row-chk').forEach(c => {
    const row = allRows[parseInt(c.dataset.gidx, 10)];
    if (row && selected.has(row.doc_path)) c.checked = true;
  });
  const sa = document.getElementById('select-all');
  const all = document.querySelectorAll('.row-chk');
  if (sa && all.length) sa.checked = all.length > 0 && [...all].every(c => c.checked);
  _syncGroupCheckboxes();
}

// ── Save follow-up field via API ──────────────────────────────────────────────

async function saveField(el) {
  const gidx  = parseInt(el.dataset.gidx, 10);
  const field = el.dataset.field;
  const value = el.value;
  const row   = allRows[gidx];
  if (!row) return;

  if ((row[field] || '') === value) return;
  const oldValue = row[field] || '';
  row[field] = value;

  const td = el.closest('td');
  let dot  = td.querySelector('.save-dot');
  if (!dot) { dot = document.createElement('span'); dot.className = 'save-dot'; td.appendChild(dot); }
  dot.classList.remove('err', 'ok');
  dot.title = '';

  try {
    await apiPatchContact(row, { [field]: value });

    const user = (window._authUser && (window._authUser.email || window._authUser.uid)) || 'unknown';
    const entry = buildLocalHistoryEntry(field, value, user);
    if (entry) { row.comment_history.push(entry); refreshHistoryPanel(gidx); }

    dot.classList.add('ok');
    setTimeout(() => dot.remove(), 900);
  } catch (e) {
    console.error('[crm_follow] save failed:', e.message);
    row[field] = oldValue;
    dot.classList.add('err');
    dot.title = 'Save failed: ' + e.message;
  }
}

function buildLocalHistoryEntry(field, value, user) {
  const typeMap = {
    followup_status:     'STATUS',
    followup_comment:    'COMMENT',
    followup_date:       'FOLLOWUP',
    followup_importance: 'IMPORTANCE',
  };
  const textMap = {
    followup_status:     v => { const l = (FU_STATUSES.find(s => s.value === v) || {}).label || v || '(none)'; return `Status → ${l}`; },
    followup_comment:    v => v || '(comment cleared)',
    followup_date:       v => v ? `Follow-up date set to ${v}` : 'Follow-up date cleared',
    followup_importance: v => { const l = (IMPORTANCE_LEVELS.find(i => i.value === v) || {}).label || v || '(none)'; return `Importance → ${l}`; },
  };
  if (!typeMap[field]) return null;
  return { date: new Date().toISOString(), user, text: textMap[field](value), type: typeMap[field] };
}

// ── Batch date update ─────────────────────────────────────────────────────────

function getSyncCutoff() {
  const days = parseInt(document.getElementById('sync-period')?.value || '7', 10);
  if (!days) return null;
  const d = new Date(); d.setDate(d.getDate() - days); return d;
}

function showBatchDatePanel() {
  document.getElementById('batch-apply-count').textContent = selected.size;
  document.getElementById('batch-date-status').textContent = '';
  document.getElementById('batch-date-panel').style.display = '';
  document.getElementById('batch-date-input').focus();
}

function hideBatchDatePanel() {
  document.getElementById('batch-date-panel').style.display = 'none';
}

async function applyBatchDate() {
  const date    = document.getElementById('batch-date-input').value;
  const comment = document.getElementById('batch-date-comment').value.trim();
  const statusEl = document.getElementById('batch-date-status');
  if (!date) { statusEl.style.color = '#dc2626'; statusEl.textContent = 'Please pick a date first.'; return; }

  const rows = allRows.filter(r => selected.has(r.doc_path));
  if (!rows.length) return;

  statusEl.style.color = 'var(--bb-muted)';
  statusEl.textContent = `Updating ${rows.length} contact${rows.length === 1 ? '' : 's'}…`;

  let done = 0, errors = 0;
  await Promise.all(rows.map(async r => {
    try {
      const fields = { followup_date: date };
      if (comment) fields.followup_comment = comment;
      await apiPatchContact(r, fields);
      r.followup_date = date;
      if (comment) r.followup_comment = comment;
      const user = (window._authUser && (window._authUser.email || window._authUser.uid)) || 'unknown';
      r.comment_history.push({ date: new Date().toISOString(), user,
        text: comment ? `Follow-up date set to ${date} — ${comment}` : `Follow-up date set to ${date}`,
        type: 'FOLLOWUP' });
      done++;
    } catch (e) { errors++; console.error('[batch-date]', r.email, e.message); }
  }));

  if (errors) { statusEl.style.color = '#dc2626'; statusEl.textContent = `${done} updated, ${errors} failed.`; }
  else        { statusEl.style.color = '#15803d'; statusEl.textContent = `${done} contact${done === 1 ? '' : 's'} updated.`; }

  applyFilter();
  if (!errors) { hideBatchDatePanel(); clearSelection(); }
}

// ── Selection ─────────────────────────────────────────────────────────────────

function onRowCheck(chk) {
  const row = allRows[parseInt(chk.dataset.gidx, 10)];
  if (!row) return;
  if (chk.checked) selected.add(row.doc_path); else selected.delete(row.doc_path);
  _syncGroupCheckboxes();
  updateSelectionUI();
}

function toggleSelectAll(chk) {
  document.querySelectorAll('.row-chk').forEach(c => {
    c.checked = chk.checked;
    const row = allRows[parseInt(c.dataset.gidx, 10)];
    if (row) {
      if (chk.checked) selected.add(row.doc_path);
      else selected.delete(row.doc_path);
    }
  });
  updateSelectionUI();
}

function toggleGroupSelect(event, groupKey) {
  event.stopPropagation();
  const chk = event.currentTarget;
  const paths = _groupDocPaths[groupKey] || [];
  paths.forEach(path => {
    if (chk.checked) selected.add(path);
    else selected.delete(path);
  });
  // Sync individual row checkboxes
  document.querySelectorAll('.row-chk').forEach(c => {
    const row = allRows[parseInt(c.dataset.gidx, 10)];
    if (row && paths.includes(row.doc_path)) c.checked = chk.checked;
  });
  // Sync the global select-all checkbox
  const sa = document.getElementById('select-all');
  const allChk = document.querySelectorAll('.row-chk');
  if (sa && allChk.length) sa.checked = [...allChk].every(c => c.checked);
  _syncGroupCheckboxes();
  updateSelectionUI();
}

function _syncGroupCheckboxes() {
  document.querySelectorAll('.group-chk').forEach(gc => {
    const paths = _groupDocPaths[gc.dataset.gkey] || [];
    gc.checked = paths.length > 0 && paths.every(p => selected.has(p));
  });
}

function clearSelection() {
  selected.clear();
  document.querySelectorAll('.row-chk').forEach(c => { c.checked = false; });
  document.querySelectorAll('.group-chk').forEach(c => { c.checked = false; });
  const sa = document.getElementById('select-all');
  if (sa) sa.checked = false;
  updateSelectionUI();
}

function updateSelectionUI() {
  const n = selected.size;
  document.getElementById('batch-count').textContent = n;
  document.getElementById('batch-bar').style.display = n > 0 ? '' : 'none';
  const ac = document.getElementById('batch-apply-count');
  if (ac) ac.textContent = n;
  if (n === 0) hideBatchDatePanel();
}

// ── Feedback div (matches pattern on crm-sync.html / campaign.html) ───────────

function setFeedback(msg, type) {
  const fb = document.getElementById('sync-feedback');
  if (!type) { fb.style.display = 'none'; return; }
  fb.className = `alert alert-${type} py-2 px-3 small mb-3`;
  fb.innerHTML = msg;
  fb.style.display = '';
}

// ── Email sync (backend job + poll) ──────────────────────────────────────────

async function syncContactEmails(gidx, btn) {
  const row = allRows[gidx];
  if (!row || !row.email) { alert('Contact has no email address.'); return; }
  btn.classList.add('spinning'); btn.disabled = true;
  try {
    const days     = parseInt(document.getElementById('sync-period')?.value || '7', 10);
    const outreach = document.getElementById('outreach-filter')?.value || '';
    const res  = await fetchJSON(`${BASE}/api/crm/followup-email-sync`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ campaign_id: row.campaign_id, contact_doc_id: row.doc_id, days,
                                ...(outreach ? { outreach_account: outreach } : {}) }),
    });
    setFeedback(
      `<i class="ti ti-clock me-1"></i>Email sync queued <code>${res.job_id}</code>`
      + ` for <strong>${escapeHtml(row.email)}</strong> — polling…`,
      'info'
    );
    await pollJob(res.job_id, {
      onDone: async result => {
        const n = result.synced_entries || 0;
        setFeedback(
          `<i class="ti ti-check me-1"></i><strong>${escapeHtml(row.email)}</strong>`
          + ` — ${n} new email${n === 1 ? '' : 's'} synced.`,
          n > 0 ? 'success' : 'info'
        );
        if (n > 0) await refreshContactHistory(gidx);
      },
      onError: msg => setFeedback(
        `<i class="ti ti-circle-x me-1"></i>Sync failed for <strong>${escapeHtml(row.email)}</strong>: ${escapeHtml(msg)}`,
        'danger'
      ),
    });
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>Error: ${escapeHtml(e.message)}`, 'danger');
  } finally {
    btn.classList.remove('spinning'); btn.disabled = false;
  }
}

async function syncAllEmails() {
  const btn = document.getElementById('sync-all-btn');
  btn.disabled  = true;
  btn.innerHTML = '<i class="ti ti-loader me-1" style="animation:spin .7s linear infinite;display:inline-block"></i>Queuing…';
  setFeedback(null);
  try {
    const days     = parseInt(document.getElementById('sync-period')?.value || '7', 10);
    const camp     = document.getElementById('campaign-filter')?.value || '';
    const outreach = document.getElementById('outreach-filter')?.value || '';
    const res  = await fetchJSON(`${BASE}/api/crm/followup-email-sync`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        days,
        ...(camp     ? { campaign_id:      camp }     : {}),
        ...(outreach ? { outreach_account: outreach } : {}),
      }),
    });
    setFeedback(
      `<i class="ti ti-clock me-1"></i>Email sync queued <code>${res.job_id}</code>`
      + ` (last ${days} day${days === 1 ? '' : 's'}) — polling…`,
      'info'
    );
    await pollJob(res.job_id, {
      onDone: result => {
        const n = result.synced_entries || 0;
        const c = result.synced_contacts || 0;
        setFeedback(
          `<i class="ti ti-check me-1"></i>Sync complete — `
          + `<strong>${n}</strong> new email${n === 1 ? '' : 's'} across `
          + `<strong>${c}</strong> contact${c === 1 ? '' : 's'}.`
          + (result.errors && result.errors.length ? ` <span class="text-danger">${result.errors.length} error(s).</span>` : ''),
          n > 0 ? 'success' : 'info'
        );
        if (n > 0) load();
      },
      onError: msg => setFeedback(
        `<i class="ti ti-circle-x me-1"></i>Sync failed: ${escapeHtml(msg)}`, 'danger'
      ),
    });
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>Error: ${escapeHtml(e.message)}`, 'danger');
  } finally {
    btn.disabled  = false;
    btn.innerHTML = '<i class="ti ti-mail-bolt me-1"></i>Sync';
  }
}

// ── Comment history UI ────────────────────────────────────────────────────────

function toggleHistory(btn, gidx) {
  const row = document.getElementById('hist-' + gidx);
  if (!row) return;
  const open = row.style.display !== 'none';
  row.style.display = open ? 'none' : '';
  btn.querySelector('i').className = open ? 'ti ti-chevron-down' : 'ti ti-chevron-up';
}

function renderHistoryContent(history) {
  if (!history.length) return '<span class="small" style="color:var(--bb-muted)">No history yet.</span>';
  return '<div class="hist-list">'
    + [...history].reverse().map(h => {
        const d = h.date ? new Date(h.date).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' }) : '—';
        const isEmailIn  = h.type === 'EMAIL_IN';
        const isEmailOut = h.type === 'EMAIL_OUT';
        const isEmail    = isEmailIn || isEmailOut;
        const extraCls   = isEmailIn ? 'hist-entry-email-in' : isEmailOut ? 'hist-entry-email-out' : '';
        const typeBadge  = isEmailIn
          ? `<span class="hist-type-badge hist-type-in">IN</span>`
          : isEmailOut ? `<span class="hist-type-badge hist-type-out">OUT</span>` : '';
        return `<div class="hist-entry ${extraCls}" style="grid-template-columns:${isEmail ? '60px 120px 130px 1fr' : '120px 140px 1fr'}">
          ${typeBadge}
          <span class="hist-entry-date">${escapeHtml(d)}</span>
          <span class="hist-entry-user">${escapeHtml(isEmail ? (h.from || h.user) : h.user)}</span>
          <span class="hist-entry-text">${escapeHtml(h.text)}</span>
        </div>`;
      }).join('') + '</div>';
}

function refreshHistoryPanel(gidx) {
  const row = document.getElementById('hist-' + gidx);
  if (!row) return;
  const td = row.querySelector('td:last-child');
  if (td) td.innerHTML = renderHistoryContent(allRows[gidx].comment_history);
  const count = allRows[gidx].comment_history.length;
  const btn   = document.querySelector(`[onclick="toggleHistory(this,${gidx})"] .hist-count`);
  if (btn) { btn.textContent = count; btn.classList.toggle('has-entries', count > 0); }
}



function setTbody(html) {
  document.getElementById('follow-tbody').innerHTML = html;
}

// ── Due-date helpers ──────────────────────────────────────────────────────────

function _today()   { return new Date().toISOString().slice(0, 10); }
function _weekEnd() { const d = new Date(); d.setDate(d.getDate() + 7); return d.toISOString().slice(0, 10); }

function dueDateClass(date) {
  if (!date) return '';
  const t = _today();
  if (date < t)           return 'overdue';
  if (date === t)         return 'due-today';
  if (date <= _weekEnd()) return 'due-soon';
  return '';
}

// ── User preference persistence (frontend-status/{email}/pages/followup) ─────

let _savePrefsTimer = null;

function _savePrefsDebounced() {
  clearTimeout(_savePrefsTimer);
  _savePrefsTimer = setTimeout(saveUserPrefs, 800);
}

async function saveUserPrefs() {
  if (!_prefsReady) return;
  const prefs = {
    owner:                  document.getElementById('owner-header')?.value          || '',
    campaign:               document.getElementById('campaign-filter')?.value       || '',
    outreach:               document.getElementById('outreach-filter')?.value       || '',
    sync_period:            document.getElementById('sync-period')?.value           || '7',
    view:                   _currentView,
    group_primary:          document.getElementById('group-primary')?.value         || 'followup_status',
    group_secondary:        document.getElementById('group-secondary')?.value       || '',
    search:                 document.getElementById('search')?.value                || '',
    filter_followup_status: document.getElementById('followup-filter')?.value       || '',
    filter_importance:      document.getElementById('importance-filter')?.value     || '',
    filter_contact_status:  document.getElementById('contact-status-filter')?.value || '',
    filter_due:             document.getElementById('due-filter')?.value            || '',
    sort_col:               _sortCol,
    sort_asc:               _sortAsc,
  };
  try {
    await fetchJSON(BASE + '/api/crm/user-prefs?page=followup', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(prefs),
    });
  } catch (e) {
    console.warn('[prefs] save failed:', e.message);
  }
}

async function loadUserPrefs() {
  // Fetch prefs and store. All application happens inside load() once dropdowns are ready.
  try {
    const prefs = await fetchJSON(BASE + '/api/crm/user-prefs?page=followup');
    if (prefs && Object.keys(prefs).length) {
      _loadedPrefs = prefs;
      if (prefs.outreach) _pendingOutreach = prefs.outreach;
    }
  } catch (e) {
    console.warn('[prefs] load failed:', e.message);
  }
  // _prefsReady is set inside load() after all prefs are applied
}

(async () => { await loadUserPrefs(); load(); })();
