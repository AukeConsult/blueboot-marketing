async function applyMove() {
  const isNew   = document.getElementById('move-opt-new').checked;
  const statusEl = document.getElementById('move-status');
  const btn      = document.getElementById('move-apply-btn');

  let body = {};
  if (isNew) {
    const name = document.getElementById('move-new-name').value.trim();
    if (!name) { statusEl.style.color = '#dc2626'; statusEl.textContent = 'Enter a campaign name.'; return; }
    body.new_campaign_name = name;
  } else {
    const campId = document.getElementById('move-campaign-select').value;
    if (!campId) { statusEl.style.color = '#dc2626'; statusEl.textContent = 'Select a target campaign.'; return; }
    body.target_campaign_id = campId;
  }

  // Group selected rows by source campaign_id
  const rowsToMove = allRows.filter(r => selected.has(r.doc_path));
  if (!rowsToMove.length) return;

  // Group by campaign_id (multi-campaign view support)
  const byCampaign = {};
  for (const r of rowsToMove) {
    if (!byCampaign[r.campaign_id]) byCampaign[r.campaign_id] = [];
    byCampaign[r.campaign_id].push(r.doc_id);
  }

  btn.disabled = true;
  statusEl.style.color = 'var(--bb-muted)';
  statusEl.textContent = `Moving ${rowsToMove.length} contact${rowsToMove.length === 1 ? '' : 's'}…`;

  const targetName = body.target_campaign_id || body.new_campaign_name;

  // Fire one job per source campaign (multi-campaign view support)
  const jobIds = [];
  try {
    for (const [srcCampId, docIds] of Object.entries(byCampaign)) {
      const res = await fetchJSON(
        `${BASE}/api/crm/campaigns/${encodeURIComponent(srcCampId)}/contacts/move`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...body, doc_ids: docIds }) }
      );
      if (res.job_id) jobIds.push(res.job_id);
    }
  } catch (e) {
    statusEl.style.color = '#dc2626';
    statusEl.textContent = `Failed: ${e.message}`;
    btn.disabled = false;
    return;
  }

  hideMovePanel();
  const movedPaths = new Set(rowsToMove.map(r => r.doc_path));

  // Poll all jobs; when all done remove rows and show feedback
  setFeedback(`<i class="ti ti-clock me-1"></i>Moving ${rowsToMove.length} contact${rowsToMove.length===1?'':'s'} to <strong>${escapeHtml(targetName)}</strong> — please wait…`, 'info');
  let totalMoved = 0, anyError = false;
  for (const jid of jobIds) {
    await new Promise(resolve => {
      pollJob(jid, {
        onDone: result => {
          totalMoved += (result.moved || 0);
          if (result.errors && result.errors.length) {
            anyError = true;
            console.warn('[move] job errors', jid, result.errors);
          }
          resolve();
        },
        onError: msg => {
          anyError = true;
          console.warn('[move] job failed', jid, msg);
          resolve();
        },
      });
    });
  }

  // Remove moved rows from allRows only if they were actually moved
  if (totalMoved > 0) {
    for (let i = allRows.length - 1; i >= 0; i--) {
      if (movedPaths.has(allRows[i].doc_path)) allRows.splice(i, 1);
    }
  }
  clearSelection();
  applyFilter();
  if (totalMoved === 0 && anyError) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>Move failed — check Cloud Function logs for details.`, 'danger');
  } else {
    setFeedback(
      `<i class="ti ti-check me-1"></i>${totalMoved} contact${totalMoved===1?'':'s'} moved to <strong>${escapeHtml(targetName)}</strong>${anyError ? ' (some may have failed — check logs)' : ''}.`,
      anyError ? 'warning' : 'success'
    );
  }
  btn.disabled = false;
}

// ── Selection ─────────────────────────────────────────────────────────────────

function onRowCheck(chk) {
  const row = allRows[parseInt(chk.dataset.gidx, 10)];
  if (!row) return;
  if (chk.checked) selected.add(row.doc_path); else selected.delete(row.doc_path);
  _syncGroupCheckboxes();
  updateSelectionUI();
}

function toggleSelectAll(chk) {
  document.querySelectorAll('.row-chk').forEach(c => {
    c.checked = chk.checked;
    const row = allRows[parseInt(c.dataset.gidx, 10)];
    if (row) {
      if (chk.checked) selected.add(row.doc_path);
      else selected.delete(row.doc_path);
    }
  });
  updateSelectionUI();
}

function toggleGroupSelect(event, groupKey) {
  event.stopPropagation();
  const chk = event.currentTarget;
  const paths = _groupDocPaths[groupKey] || [];
  paths.forEach(path => {
    if (chk.checked) selected.add(path);
    else selected.delete(path);
  });
  // Sync individual row checkboxes
  document.querySelectorAll('.row-chk').forEach(c => {
    const row = allRows[parseInt(c.dataset.gidx, 10)];
    if (row && paths.includes(row.doc_path)) c.checked = chk.checked;
  });
  // Sync the global select-all checkbox
  const sa = document.getElementById('select-all');
  const allChk = document.querySelectorAll('.row-chk');
  if (sa && allChk.length) sa.checked = [...allChk].every(c => c.checked);
  _syncGroupCheckboxes();
  updateSelectionUI();
}

function _syncGroupCheckboxes() {
  document.querySelectorAll('.group-chk').forEach(gc => {
    const paths = _groupDocPaths[gc.dataset.gkey] || [];
    gc.checked = paths.length > 0 && paths.every(p => selected.has(p));
  });
}

function clearSelection() {
  selected.clear();
  _ACTION_PANELS.forEach(p => { document.getElementById(p).style.display = 'none'; });
  document.querySelectorAll('.row-chk').forEach(c => { c.checked = false; });
  document.querySelectorAll('.group-chk').forEach(c => { c.checked = false; });
  const sa = document.getElementById('select-all');
  if (sa) sa.checked = false;
  updateSelectionUI();
}

function updateSelectionUI() {
  const n = selected.size;
  document.getElementById('batch-count').textContent = n;
  document.getElementById('action-bar').style.display = n > 0 ? '' : 'none';
  const ac = document.getElementById('batch-apply-count');
  if (ac) ac.textContent = n;
  if (n === 0) hideBatchDatePanel();
}

// ── Feedback div (matches pattern on crm-sync.html / campaign.html) ───────────

function setFeedback(msg, type) {
  const fb = document.getElementById('sync-feedback');
  if (!type) { fb.style.display = 'none'; return; }
  fb.className = `alert alert-${type} py-2 px-3 small mb-3`;
  fb.innerHTML = msg;
  fb.style.display = '';
}

// ── Email sync (backend job + poll) ──────────────────────────────────────────

async function syncContactEmails(gidx, btn) {
  const row = allRows[gidx];
  if (!row || !row.email) { alert('Contact has no email address.'); return; }
  btn.classList.add('spinning'); btn.disabled = true;
  try {
    const days     = parseInt(document.getElementById('sync-period')?.value || '7', 10);
    const res  = await fetchJSON(`${BASE}/api/crm/followup-email-sync`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ campaign_id: row.campaign_id, contact_doc_id: row.doc_id, days }),
    });
    setFeedback(
      `<i class="ti ti-clock me-1"></i>Email sync queued <code>${res.job_id}</code>`
      + ` for <strong>${escapeHtml(row.email)}</strong> — polling…`,
      'info'
    );
    await pollJob(res.job_id, {
      onDone: async result => {
        const n = result.synced_entries || 0;
        setFeedback(
          `<i class="ti ti-check me-1"></i><strong>${escapeHtml(row.email)}</strong>`
          + ` — ${n} new email${n === 1 ? '' : 's'} synced.`,
          n > 0 ? 'success' : 'info'
        );
        if (n > 0) await refreshContactHistory(gidx);
      },
      onError: msg => setFeedback(
        `<i class="ti ti-circle-x me-1"></i>Sync failed for <strong>${escapeHtml(row.email)}</strong>: ${escapeHtml(msg)}`,
        'danger'
      ),
    });
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>Error: ${escapeHtml(e.message)}`, 'danger');
  } finally {
    btn.classList.remove('spinning'); btn.disabled = false;
  }
}

async function syncAllEmails() {
  const btn = document.getElementById('sync-all-btn');
  btn.disabled  = true;
  btn.innerHTML = '<i class="ti ti-loader me-1" style="animation:spin .7s linear infinite;display:inline-block"></i>Queuing…';
  setFeedback(null);
  try {
    const days     = parseInt(document.getElementById('sync-period')?.value || '7', 10);
    const camp     = document.getElementById('campaign-filter')?.value || '';
    const res  = await fetchJSON(`${BASE}/api/crm/followup-email-sync`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        days,
        ...(camp ? { campaign_id: camp } : {}),
      }),
    });
    setFeedback(
      `<i class="ti ti-clock me-1"></i>Email sync queued <code>${res.job_id}</code>`
      + ` (last ${days} day${days === 1 ? '' : 's'}) — polling…`,
      'info'
    );
    await pollJob(res.job_id, {
      onDone: result => {
        const n = result.synced_entries || 0;
        const c = result.synced_contacts || 0;
        setFeedback(
          `<i class="ti ti-check me-1"></i>Sync complete — `
          + `<strong>${n}</strong> new email${n === 1 ? '' : 's'} across `
          + `<strong>${c}</strong> contact${c === 1 ? '' : 's'}.`
          + (result.errors && result.errors.length ? ` <span class="text-danger">${result.errors.length} error(s).</span>` : ''),
          n > 0 ? 'success' : 'info'
        );
        if (n > 0) load();
      },
      onError: msg => setFeedback(
        `<i class="ti ti-circle-x me-1"></i>Sync failed: ${escapeHtml(msg)}`, 'danger'
      ),
    });
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>Error: ${escapeHtml(e.message)}`, 'danger');
  } finally {
    btn.disabled  = false;
    btn.innerHTML = '<i class="ti ti-mail-bolt me-1"></i>Sync';
  }
}

// ── Comment history UI ────────────────────────────────────────────────────────

// ── Row expand / collapse state ──────────────────────────────────────────────
let _expandedGidx = -1;

function onRowExpand(gidx) {
  if (_expandedGidx === gidx) return;
  if (_expandedGidx >= 0) _collapseRow(_expandedGidx);
  _expandedGidx = gidx;
  // Expand the textarea to fit its content
  const ta = document.querySelector(`.comment-row-input[data-gidx="${gidx}"]`);
  if (ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
}

function _collapseRow(gidx) {
  // Collapse textarea to 1 line
  const ta = document.querySelector(`.comment-row-input[data-gidx="${gidx}"]`);
  if (ta) ta.style.height = '';
  // Hide history row and reset toggle chevron
  const histRow = document.getElementById('hist-' + gidx);
  if (histRow && histRow.style.display !== 'none') {
    histRow.style.display = 'none';
    const btn = document.querySelector(`[onclick="toggleHistory(this,${gidx})"]`);
    if (btn) btn.querySelector('i').className = 'ti ti-chevron-down';
  }
}

// Collapse expanded row when clicking outside the contacts table
document.addEventListener('click', e => {
  if (_expandedGidx < 0) return;
  if (!e.target.closest('#follow-tbody')) {
    _collapseRow(_expandedGidx);
    _expandedGidx = -1;
  }
}, false);

function toggleHistory(btn, gidx) {
  const row = document.getElementById('hist-' + gidx);
  if (!row) return;
  const open = row.style.display !== 'none';
  row.style.display = open ? 'none' : '';
  btn.querySelector('i').className = open ? 'ti ti-chevron-down' : 'ti ti-chevron-up';
}

let _histExpanded = new Set();

function toggleHistEntry(key, el) {
  if (_histExpanded.has(key)) _histExpanded.delete(key);
  else _histExpanded.add(key);
  const entry = el.closest('.hist-entry');
  if (!entry) return;
  entry.classList.toggle('hist-entry-open', _histExpanded.has(key));
  const chevron = entry.querySelector('.hist-entry-chevron');
  if (chevron) { chevron.classList.toggle('ti-chevron-down', !_histExpanded.has(key)); chevron.classList.toggle('ti-chevron-up', _histExpanded.has(key)); }
}

function renderHistoryContent(history) {
  if (!history.length) return '<span class="small" style="color:var(--bb-muted)">No history yet.</span>';
  return '<div class="hist-list">'
    + [...history].reverse().map((h, i) => {
        const d        = h.date ? new Date(h.date).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' }) : '—';
        const isEmailIn  = h.type === 'EMAIL_IN';
        const isEmailOut = h.type === 'EMAIL_OUT';
        const isEmail    = isEmailIn || isEmailOut;
        const extraCls   = isEmailIn ? 'hist-entry-email-in' : isEmailOut ? 'hist-entry-email-out' : '';
        const typeBadge  = isEmailIn
          ? `<span class="hist-type-badge hist-type-in">IN</span>`
          : isEmailOut ? `<span class="hist-type-badge hist-type-out">OUT</span>` : '';
        const text    = h.text || '';
        const key     = `${i}_${(h.date||'').slice(0,10)}`;
        const preview = text.length > 60 ? text.slice(0, 60) + '…' : text;
        const detail  = isEmail
          ? `<div class="hist-entry-detail">
               ${h.from ? `<div><span class="hist-detail-lbl">From</span> ${escapeHtml(h.from)}</div>` : ''}
               ${h.to   ? `<div><span class="hist-detail-lbl">To</span> ${escapeHtml(h.to)}</div>` : ''}
               ${text   ? `<div class="hist-entry-text mt-1">${escapeHtml(text)}</div>` : ''}
             </div>`
          : `<div class="hist-entry-detail">
               <div><span class="hist-detail-lbl">By</span> ${escapeHtml(h.user || '')}</div>
               ${text ? `<div class="hist-entry-text mt-1">${escapeHtml(text)}</div>` : ''}
             </div>`;
        return `<div class="hist-entry ${extraCls}" onclick="toggleHistEntry('${key}',this)" style="cursor:pointer">
          <div class="hist-entry-summary">
            ${typeBadge}
            <span class="hist-entry-date">${escapeHtml(d)}</span>
            <span class="hist-entry-preview">${escapeHtml(preview)}</span>
            <i class="ti ti-chevron-down hist-entry-chevron"></i>
          </div>
          ${detail}
        </div>`;
      }).join('') + '</div>';
}

function refreshHistoryPanel(gidx) {
  const row = document.getElementById('hist-' + gidx);
  if (!row) return;
  const td = row.querySelector('td:last-child');
  if (td) td.innerHTML = renderHistoryContent(allRows[gidx].comment_history);
  const count = allRows[gidx].comment_history.length;
  const btn   = document.querySelector(`[onclick="toggleHistory(this,${gidx})"] .hist-count`);
  if (btn) { btn.textContent = count; btn.classList.toggle('has-entries', count > 0); }
}



function setTbody(html) {
  document.getElementById('follow-tbody').innerHTML = html;
  // Reset expanded row tracking — DOM was rebuilt
  _expandedGidx = -1;
}

// ── Due-date helpers ──────────────────────────────────────────────────────────

function _today()   { return new Date().toISOString().slice(0, 10); }
function _weekEnd() { const d = new Date(); d.setDate(d.getDate() + 7); return d.toISOString().slice(0, 10); }

function dueDateClass(date) {
  if (!date) return '';
  const t = _today();
  if (date < t)           return 'overdue';
  if (date === t)         return 'due-today';
  if (date <= _weekEnd()) return 'due-soon';
  return '';
}

// ── User preference persistence (frontend-status/{email}/pages/followup) ─────

let _savePrefsTimer = null;

function _savePrefsDebounced() {
  clearTimeout(_savePrefsTimer);
  _savePrefsTimer = setTimeout(saveUserPrefs, 800);
}

async function saveUserPrefs() {
  if (!_prefsReady) return;
  const prefs = {
    owner:                 document.getElementById('owner-header')?.value       || '',
    campaign:              document.getElementById('campaign-filter')?.value    || '',
    filter_followup_status: document.getElementById('followup-filter')?.value   || '',
    filter_importance:     document.getElementById('importance-filter')?.value  || '',
    filter_contact_status: document.getElementById('contact-status-filter')?.value || '',
    filter_due:            document.getElementById('due-filter')?.value         || '',
    search:                document.getElementById('search')?.value             || '',
    group_primary:         document.getElementById('group-primary')?.value      || '',
    group_secondary:       document.getElementById('group-secondary')?.value    || '',
    view:                  _currentView,
    sort_col:              _sortCol,
    sort_asc:              _sortAsc,
    side_open:             _sideOpen,
    sync_period:           document.getElementById('sync-period')?.value        || '',
    sp_channels_open:      _spChannelsOpen,
    sp_company_open:       _spCompanyOpen,
  };
  try {
    await fetchJSON(`${BASE}/api/crm/user-prefs?page=followup`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(prefs),
    });
  } catch(e) { /* silent — prefs are best-effort */ }
}

async function loadUserPrefs() {
  try {
    const prefs = await fetchJSON(`${BASE}/api/crm/user-prefs?page=followup`);
    _loadedPrefs = prefs || {};
  } catch(e) {
    _loadedPrefs = {};
  }
}

// ── Page init ─────────────────────────────────────────────────────────────────

(async () => {
  await requireAuth();
  requireRole(['campaign-user', 'admin']);
  await loadUserPrefs();
  await load();
})();
