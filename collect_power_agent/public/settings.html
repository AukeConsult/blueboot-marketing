<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Blueboot CRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
body { background: #f8f9fa; }
</style>
</head>
<body>

<div class="container py-4" style="max-width:820px">

  <div class="d-flex align-items-center gap-2 mb-3">
    <a href="index.html" class="btn btn-sm btn-outline-secondary" onclick="return goBack()"><i class="ti ti-arrow-left"></i></a>
    <h5 class="mb-0"><i class="ti ti-settings me-2"></i>Settings</h5>
  </div>

  <!-- Google Drive folder -->
  <div class="card p-3 mb-3">
    <h6 class="fw-semibold mb-1"><i class="ti ti-brand-google-drive me-1 text-primary"></i>Google Drive folder</h6>
    <p class="small text-muted mb-2">The folder the Drive Folder page reads and writes. Paste the ID from the
      folder URL (the part after <code>/folders/</code>), then save and check access.</p>
    <label class="form-label small text-muted mb-1">Drive folder ID</label>
    <div class="row g-2 align-items-end">
      <div class="col-md-9">
        <input id="folder-id" class="form-control form-control-sm" placeholder="1AbCdEf…">
      </div>
      <div class="col-md-3">
        <button class="btn btn-outline-primary btn-sm w-100" onclick="saveSetting()"><i class="ti ti-device-floppy me-1"></i>Save folder</button>
      </div>
    </div>
    <div class="mt-2">
      <button class="btn btn-outline-secondary btn-sm" onclick="checkAccess()"><i class="ti ti-shield-check me-1"></i>Check access</button>
      <a class="btn btn-link btn-sm text-decoration-none" href="gdisk.html"><i class="ti ti-external-link me-1"></i>Open Drive Folder</a>
    </div>
    <div id="setting-status" class="small mt-2 text-muted"></div>
    <div id="access-status" class="mt-2"></div>
  </div>

</div>

<script src="js/crm-common.js"></script>
<script>
const setStatus = setStatusEl;
const esc = escapeHtml;

async function loadSetting(){
  try{
    const r = await fetch(BASE + '/api/crm/gdisk/settings');
    const d = await r.json();
    document.getElementById('folder-id').value = d.folder_id || '';
    if(!d.configured) setStatus('setting-status', 'No folder configured yet — paste a Drive folder ID and save.', 'muted');
  }catch(e){ setStatus('setting-status', 'Could not read settings: ' + prettyError(e.message), 'err', true); }
}

async function saveSetting(){
  const folder_id = document.getElementById('folder-id').value.trim();
  setStatus('setting-status', 'Saving…');
  try{
    const r = await fetch(BASE + '/api/crm/gdisk/settings', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({folder_id})
    });
    const d = await r.json();
    if(!r.ok || d.status === 'error') throw new Error(d.message || r.status);
    setStatus('setting-status', 'Folder saved.', 'ok');
  }catch(e){ setStatus('setting-status', 'Save failed: ' + prettyError(e.message), 'err', true); }
}

async function checkAccess(){
  const el = document.getElementById('access-status');
  el.innerHTML = '<span class="small text-muted"><span class="spinner-border spinner-border-sm me-1"></span>Checking…</span>';
  try{
    const r = await fetch(BASE + '/api/crm/gdisk/check');
    const d = await r.json();
    if(d.configured === false){ el.innerHTML = '<div class="alert alert-warning py-2 px-3 mb-0 small">'+esc(d.reason||'No folder configured.')+'</div>'; return; }
    if(!d.ok){ el.innerHTML = '<div class="alert alert-danger py-2 px-3 mb-0 small">'+prettyError(d.error||'Access check failed.')+'</div>'; return; }
    const yes = '<span class="text-success"><i class="ti ti-check"></i> yes</span>';
    const no  = '<span class="text-danger"><i class="ti ti-x"></i> no</span>';
    const cls = (d.can_read && d.can_write && d.is_folder) ? 'alert-success' : 'alert-warning';
    el.innerHTML = '<div class="alert '+cls+' py-2 px-3 mb-0 small">'
      + '<div><strong>'+esc(d.name||'(unnamed)')+'</strong> <span class="text-muted">'+esc(d.folder_id)+'</span></div>'
      + '<div class="d-flex flex-wrap gap-3 mt-1">'
      + '<span>is a folder: '+(d.is_folder?yes:no)+'</span>'
      + '<span>read: '+(d.can_read?yes:no)+'</span>'
      + '<span>write: '+(d.can_write?yes:no)+'</span>'
      + '</div>'
      + '<div class="mt-1 text-muted">Backend service account: <code>'+esc(d.service_account||'?')+'</code></div>'
      + (d.can_write ? '' : '<div class="mt-1">Share the folder with that account as <strong>Editor</strong> to enable uploads.</div>')
      + '</div>';
  }catch(e){
    el.innerHTML = '<div class="alert alert-danger py-2 px-3 mb-0 small">'+prettyError(e.message)+'</div>';
  }
}

loadSetting();
</script>
</body>
</html>
