<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Folder — Blueboot CRM</title>
<link rel="stylesheet" href="vendor/bootstrap.min.css">
<link rel="stylesheet" href="vendor/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
<style>
body { background: #f8f9fa; }
.drop-zone { border: 2px dashed #ced4da; border-radius: 12px; transition: border-color .15s, background .15s; }
.drop-zone.drag { border-color: #0d6efd; background: #e7f1ff; }
td .ti { font-size: 1rem; }
</style>
</head>
<body>

<div id="nav"></div>

<div class="container py-4" style="max-width:1000px">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="d-flex align-items-center gap-2">
      <a href="index.html" class="btn btn-sm btn-outline-secondary" onclick="return goBack()"><i class="ti ti-arrow-left"></i></a>
      <h5 class="mb-0"><i class="ti ti-brand-google-drive me-2"></i>Drive Folder</h5>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-sm btn-outline-secondary" href="settings.html"><i class="ti ti-settings me-1"></i>Settings</a>
      <button class="btn btn-sm btn-outline-secondary" onclick="loadFiles()"><i class="ti ti-refresh me-1"></i>refresh</button>
    </div>
  </div>

  <!-- Upload -->
  <div id="drop" class="drop-zone card p-4 mb-3 text-center">
    <div class="mb-2"><i class="ti ti-cloud-upload" style="font-size:2rem"></i></div>
    <p class="small text-muted mb-2">Drag &amp; drop files here, or choose files to upload</p>
    <input id="file-input" type="file" class="d-none" multiple onchange="showChosen()">
    <div class="d-flex justify-content-center gap-2">
      <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('file-input').click()"><i class="ti ti-folder me-1"></i>Choose files</button>
      <button class="btn btn-primary btn-sm" onclick="uploadChosen()"><i class="ti ti-upload me-1"></i>Upload</button>
    </div>
    <div id="chosen" class="small text-muted mt-2"></div>
    <div id="upload-status" class="small mt-2"></div>
  </div>

  <!-- File list -->
  <div class="card">
    <div class="card-body p-0">
      <table class="table table-sm table-hover mb-0 align-middle">
        <thead class="table-light">
          <tr><th>Name</th><th class="text-end">Size</th><th>Modified</th><th class="text-end">Actions</th></tr>
        </thead>
        <tbody id="files"><tr><td colspan="4" class="text-center text-muted py-4">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script src="js/crm-common.js"></script>
<script>

// shared helpers come from js/crm-common.js; thin aliases keep call sites unchanged
const setStatus = setStatusEl;     // setStatus(id, msg, kind, html)
const fmtDate   = fmtDateTime;
const esc       = escapeHtml;

async function loadFiles(){
  const tb = document.getElementById('files');
  tb.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Loading…</td></tr>';
  try{
    const r = await fetch(BASE + '/api/crm/gdisk/files');
    const d = await r.json();
    if(!r.ok || d.status === 'error') throw new Error(d.message || r.status);
    const files = d.files || [];
    if(!files.length){ tb.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Folder is empty</td></tr>'; return; }
    files.sort((a,b) => (a.name||'').localeCompare(b.name||''));
    tb.innerHTML = files.map(f => {
      const n = esc(f.name);
      const url = BASE + '/api/crm/gdisk/files/' + encodeURIComponent(f.name);
      return `<tr>
        <td><i class="ti ti-file me-1 text-muted"></i>${n}</td>
        <td class="text-end text-muted">${fmtSize(f.size)}</td>
        <td class="text-muted">${fmtDate(f.modifiedTime)}</td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-secondary me-1" href="${url}" title="Download"><i class="ti ti-download"></i></a>
          <button class="btn btn-sm btn-outline-danger" onclick="del('${n.replace(/'/g,"\\'")}')" title="Delete"><i class="ti ti-trash"></i></button>
        </td></tr>`;
    }).join('');
  }catch(e){
    tb.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">${prettyError(e.message)}</td></tr>`;
  }
}

async function uploadFiles(fileList){
  const files = [...fileList];
  if(!files.length) return;
  let done = 0;
  for(const f of files){
    setStatus('upload-status', `Uploading ${esc(f.name)} (${done+1}/${files.length})…`, 'muted', true);
    const fd = new FormData();
    fd.append('file', f, f.name);
    try{
      const r = await fetch(BASE + '/api/crm/gdisk/files', {method:'POST', body: fd});
      const d = await r.json();
      if(!r.ok || d.status === 'error') throw new Error(d.message || r.status);
      done++;
    }catch(e){
      setStatus('upload-status', `Failed on ${esc(f.name)}: ${prettyError(e.message)}`, 'err', true);
      return;
    }
  }
  setStatus('upload-status', `Uploaded ${done} file${done===1?'':'s'}.`, 'ok');
  document.getElementById('file-input').value = '';
  document.getElementById('chosen').textContent = '';
  loadFiles();
}

function showChosen(){
  const files = document.getElementById('file-input').files;
  const el = document.getElementById('chosen');
  if(!files.length){ el.textContent = ''; return; }
  el.textContent = (files.length === 1)
    ? 'Selected: ' + files[0].name
    : 'Selected ' + files.length + ' files: ' + [...files].map(f => f.name).join(', ');
}

function uploadChosen(){
  const files = document.getElementById('file-input').files;
  if(!files.length){
    setStatus('upload-status', 'Choose one or more files first.', 'err');
    return;
  }
  uploadFiles(files);
}

async function del(name){
  if(!confirm('Delete "' + name + '" from the Drive folder?')) return;
  try{
    const r = await fetch(BASE + '/api/crm/gdisk/files/' + encodeURIComponent(name), {method:'DELETE'});
    const d = await r.json();
    if(!r.ok || d.status === 'error') throw new Error(d.message || r.status);
    loadFiles();
  }catch(e){ setStatus('upload-status', 'Delete failed: ' + prettyError(e.message), 'err', true); }
}

// drag & drop
const dz = document.getElementById('drop');
['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('drag'); }));
dz.addEventListener('drop', e => { if(e.dataTransfer && e.dataTransfer.files) uploadFiles(e.dataTransfer.files); });
// click anywhere on the drop zone (except the input/button) opens the file picker
dz.style.cursor = 'pointer';
dz.addEventListener('click', e => {
  if(e.target.closest('button') || e.target.id === 'file-input') return;
  document.getElementById('file-input').click();
});

loadFiles();
</script>
<script src="vendor/bootstrap.bundle.min.js"></script>
</body>
</html>
