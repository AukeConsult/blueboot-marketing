<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueboot — Docs</title>
<link rel="stylesheet" href="vendor/bootstrap.min.css">
<link rel="stylesheet" href="vendor/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/doc-viewer.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<div id="nav"></div>

<div style="max-width:1140px;margin:0 auto;padding:1.5rem 1.5rem">
  <div class="row">

    <!-- TOC sidebar -->
    <div class="col-lg-2 d-none d-lg-block">
      <div class="toc" id="toc"></div>
    </div>

    <!-- Document body -->
    <div class="col-lg-10">
      <div class="d-flex align-items-center gap-2 mb-3">
        <a href="javascript:history.back()" class="btn btn-sm btn-outline-secondary">
          <i class="ti ti-arrow-left"></i>
        </a>
        <h6 class="page-title" id="doc-title">Loading…</h6>
      </div>
      <div id="doc-feedback" class="alert alert-danger py-2 small mb-3" style="display:none"></div>
      <div class="doc-body bb-card p-4" id="doc-content">
        <div class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm me-2"></div>Loading document…
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/crm-common.js"></script>
<script>
const DOCS = {
  'installation':        { title: 'Installation',        path: 'doc/installation.md' },
  'user-guide':          { title: 'User Guide',          path: 'doc/user-guide.md' },
  'system-architecture': { title: 'System Architecture', path: 'doc/system-architecture.md' },
  'backend-functions':   { title: 'Backend functions',    path: 'doc/backend-functions.md' },
  'pipeline-config':     { title: 'Pipeline configuration', path: 'doc/pipeline-config.md' },
  'ai-assistance':       { title: 'AI Assistance',          path: 'doc/ai-assistance.md' },
  'filter-to-campaign':  { title: 'Filter to campaign',     path: 'doc/filter-to-campaign.md' },
};

async function loadDoc() {
  const params = new URLSearchParams(location.search);
  const key    = params.get('doc') || 'user-guide';
  const meta   = DOCS[key] || DOCS['user-guide'];

  document.title       = `Blueboot — ${meta.title}`;
  document.getElementById('doc-title').textContent = meta.title;

  try {
    const r   = await fetch(meta.path);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    const md  = await r.text();
    const html = marked.parse(md);
    document.getElementById('doc-content').innerHTML = html;
    buildToc();
  } catch(e) {
    document.getElementById('doc-feedback').textContent = 'Could not load document: ' + e.message;
    document.getElementById('doc-feedback').style.display = '';
    document.getElementById('doc-content').innerHTML = '';
  }
}

function buildToc() {
  const toc      = document.getElementById('toc');
  const headings = document.querySelectorAll('#doc-content h1, #doc-content h2, #doc-content h3, #doc-content h4');
  if (headings.length < 3) return;

  let html = '<div class="toc-label">Contents</div>';
  headings.forEach((h, i) => {
    const id  = 'h-' + i;
    h.id      = id;
    const tag = h.tagName.toLowerCase();
    html += `<a href="#${id}" class="${tag}">${h.textContent}</a>`;
  });
  toc.innerHTML = html;

  // Smooth scroll
  toc.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      document.getElementById(a.getAttribute('href').slice(1))
        ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

loadDoc();
</script>
<script src="vendor/bootstrap.bundle.min.js"></script>
</body>
</html>
