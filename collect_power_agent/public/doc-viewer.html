<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueboot — Docs</title>
<link rel="stylesheet" href="vendor/bootstrap.min.css">
<link rel="stylesheet" href="vendor/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
.doc-body { max-width: 860px; margin: 0 auto; }
.doc-body h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 2px solid var(--bb-border); }
.doc-body h2 { font-size: 1.15rem; font-weight: 600; margin-top: 2rem; margin-bottom: .6rem; padding-bottom: .3rem; border-bottom: 1px solid var(--bb-border); color: var(--bb-accent); }
.doc-body h3 { font-size: 1rem; font-weight: 600; margin-top: 1.4rem; margin-bottom: .4rem; }
.doc-body h4 { font-size: .9rem; font-weight: 600; margin-top: 1rem; color: var(--bb-muted); }
.doc-body p  { font-size: .88rem; line-height: 1.7; margin-bottom: .75rem; }
.doc-body ul, .doc-body ol { font-size: .88rem; line-height: 1.7; margin-bottom: .75rem; padding-left: 1.4rem; }
.doc-body li { margin-bottom: .2rem; }
.doc-body table { width: 100%; border-collapse: collapse; font-size: .83rem; margin-bottom: 1rem; }
.doc-body th { background: #f4f5f7; font-weight: 600; text-align: left; padding: .4rem .7rem; border: 1px solid var(--bb-border); }
.doc-body td { padding: .35rem .7rem; border: 1px solid var(--bb-border); vertical-align: top; }
.doc-body tr:nth-child(even) td { background: #fafbfc; }
.doc-body code { background: #f4f5f7; border-radius: 4px; padding: .1rem .35rem; font-size: .82rem; color: #d63384; }
.doc-body pre  { background: #1e1e2e; border-radius: 8px; padding: 1rem 1.25rem; overflow-x: auto; margin-bottom: 1rem; }
.doc-body pre code { background: none; color: #cdd6f4; padding: 0; font-size: .82rem; }
.doc-body blockquote { border-left: 3px solid var(--bb-accent); padding-left: 1rem; color: var(--bb-muted); margin: 0 0 1rem; }
.toc { position: sticky; top: 1rem; font-size: .8rem; max-height: calc(100vh - 6rem); overflow-y: auto; }
.toc a { display: block; padding: .15rem 0; color: var(--bb-muted); text-decoration: none; line-height: 1.4; }
.toc a:hover { color: var(--bb-accent); }
.toc a.h2 { font-weight: 500; margin-top: .4rem; color: #333; }
.toc a.h3 { padding-left: .9rem; }
.toc a.h4 { padding-left: 1.6rem; font-size: .75rem; }
</style>
</head>
<body>

<div id="nav"></div>

<div class="container-fluid py-4 px-4">
  <div class="row">

    <!-- TOC sidebar -->
    <div class="col-lg-2 d-none d-lg-block">
      <div class="toc" id="toc"></div>
    </div>

    <!-- Document body -->
    <div class="col-lg-10">
      <div class="d-flex align-items-center gap-2 mb-3">
        <a href="javascript:history.back()" class="btn btn-sm btn-outline-secondary">
          <i class="ti ti-arrow-left"></i>
        </a>
        <h6 class="mb-0 fw-600" id="doc-title" style="font-size:.95rem">Loading…</h6>
      </div>
      <div id="doc-feedback" class="alert alert-danger py-2 small mb-3" style="display:none"></div>
      <div class="doc-body bb-card p-4" id="doc-content">
        <div class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm me-2"></div>Loading document…
        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/crm-common.js"></script>
<script>
const DOCS = {
  'user-guide':          { title: 'User Guide',          path: 'doc/user-guide.md' },
  'system-architecture': { title: 'System Architecture', path: 'doc/system-architecture.md' },
};

async function loadDoc() {
  const params = new URLSearchParams(location.search);
  const key    = params.get('doc') || 'user-guide';
  const meta   = DOCS[key] || DOCS['user-guide'];

  document.title       = `Blueboot — ${meta.title}`;
  document.getElementById('doc-title').textContent = meta.title;

  try {
    const r   = await fetch(meta.path);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    const md  = await r.text();
    const html = marked.parse(md);
    document.getElementById('doc-content').innerHTML = html;
    buildToc();
  } catch(e) {
    document.getElementById('doc-feedback').textContent = 'Could not load document: ' + e.message;
    document.getElementById('doc-feedback').style.display = '';
    document.getElementById('doc-content').innerHTML = '';
  }
}

function buildToc() {
  const toc      = document.getElementById('toc');
  const headings = document.querySelectorAll('#doc-content h1, #doc-content h2, #doc-content h3, #doc-content h4');
  if (headings.length < 3) return;

  let html = '<div class="fw-600 small mb-2" style="color:var(--bb-muted)">Contents</div>';
  headings.forEach((h, i) => {
    const id  = 'h-' + i;
    h.id      = id;
    const tag = h.tagName.toLowerCase();
    html += `<a href="#${id}" class="${tag}">${h.textContent}</a>`;
  });
  toc.innerHTML = html;

  // Smooth scroll
  toc.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      document.getElementById(a.getAttribute('href').slice(1))
        ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

loadDoc();
</script>
<script src="vendor/bootstrap.bundle.min.js"></script>
</body>
</html>
